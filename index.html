// =====================================================================
// FEATURE: ?present MODE — single-window presenter view
// Slide preview (scales to fit) + compact resizable speaker ribbon.
// ?present[&ribbon=N] — N is ribbon height in vh, clamped to 5..80, default 10.
// Drag the top edge of the ribbon to resize live; URL + localStorage update.
// =====================================================================
(function(){
  const params=new URLSearchParams(location.search);
  if(!params.has('present'))return;
  document.body.classList.add('present-mode');

  const RIBBON_MIN=5, RIBBON_MAX=80, RIBBON_DEFAULT=10;
  function clampRibbon(v){v=Number(v);if(!isFinite(v))return RIBBON_DEFAULT;return Math.max(RIBBON_MIN,Math.min(RIBBON_MAX,Math.round(v)));}
  function readInitialRibbon(){
    const urlV=params.get('ribbon');
    if(urlV!==null)return clampRibbon(urlV);
    try{const lsV=localStorage.getItem('sd-present-ribbon');if(lsV!==null)return clampRibbon(lsV);}catch(_){}
    return RIBBON_DEFAULT;
  }
  function applyRibbon(vh){document.body.style.setProperty('--ribbon-vh',String(vh));}
  function persistRibbon(vh){
    try{localStorage.setItem('sd-present-ribbon',String(vh));}catch(_){}
    const u=new URL(location.href);u.searchParams.set('present','');u.searchParams.set('ribbon',String(vh));
    // strip empty present= back to bare flag for cleanliness
    const qs=u.searchParams.toString().replace(/(^|&)present=(&|$)/,'$1present$2');
    history.replaceState(null,'',u.pathname+'?'+qs+u.hash);
  }
  let ribbonVh=readInitialRibbon();
  applyRibbon(ribbonVh);

  let prMode=(()=>{try{return localStorage.getItem('sd-present-mode')||'script';}catch(_){return'script';}})();
  function getSectionName(idx){const sl=allSlides[idx];if(!sl)return'';const sec=SECTIONS[+sl.dataset.section];return sec?.lesson?.short||sl.dataset.year||'';}
  function renderRibbon(){
    const num=document.getElementById('pr-num');const sec=document.getElementById('pr-section');const body=document.getElementById('pr-body');
    if(!num||!body)return;
    num.textContent=(current+1)+' / '+total;
    sec.textContent=getSectionName(current);
    if(prMode==='bullets'){
      const bl=(typeof bulletsForSlide==='function')?bulletsForSlide(current):(typeof autoBullets==='function'?autoBullets(getSlideNotes(current)):[]);
      body.innerHTML=bl.length?'<ul class="pr-bullets">'+bl.map(b=>'<li>'+String(b).replace(/</g,'&lt;')+'</li>').join('')+'</ul>':'<em class="pr-empty">(no bullets — script empty)</em>';
    }else{
      const s=(typeof scriptForSlide==='function')?scriptForSlide(current):(getSlideNotes(current)||'');
      body.textContent=s||'(no notes for this slide)';
    }
    body.scrollTop=0;
  }
  function setMode(m){
    prMode=m;
    try{localStorage.setItem('sd-present-mode',m);}catch(_){}
    document.querySelectorAll('.pr-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
    renderRibbon();
  }

  const r=document.createElement('div');r.id='present-ribbon';
  r.innerHTML='<div class="pr-grip" id="pr-grip" title="Drag to resize · double-click to reset"></div><div class="pr-head"><span class="pr-meta"><span class="pr-num" id="pr-num">--</span><span class="pr-sep">·</span><span class="pr-section" id="pr-section">--</span></span><div class="pr-toggle"><button class="pr-tab" data-mode="script">Script</button><button class="pr-tab" data-mode="bullets">Bullets</button></div></div><div class="pr-body" id="pr-body"></div>';
  document.body.appendChild(r);
  r.querySelectorAll('.pr-tab').forEach(t=>t.addEventListener('click',()=>setMode(t.dataset.mode)));
  setMode(prMode);

  // Drag-resize on grip (mouse + touch via pointer events)
  const grip=r.querySelector('#pr-grip');
  let dragStartY=0, dragStartVh=0, dragging=false;
  function onDown(e){
    dragging=true;dragStartY=(e.clientY!=null?e.clientY:e.touches?.[0]?.clientY)||0;dragStartVh=ribbonVh;
    grip.classList.add('dragging');document.body.classList.add('pr-dragging');
    if(e.pointerId!=null&&grip.setPointerCapture){try{grip.setPointerCapture(e.pointerId);}catch(_){}}
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    const y=(e.clientY!=null?e.clientY:e.touches?.[0]?.clientY)||0;
    const dy=dragStartY-y;
    const dVh=(dy/window.innerHeight)*100;
    ribbonVh=clampRibbon(dragStartVh+dVh);
    applyRibbon(ribbonVh);
  }
  function onUp(){
    if(!dragging)return;
    dragging=false;grip.classList.remove('dragging');document.body.classList.remove('pr-dragging');
    persistRibbon(ribbonVh);
  }
  if(window.PointerEvent){
    grip.addEventListener('pointerdown',onDown);
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onUp);
  }else{
    grip.addEventListener('mousedown',onDown);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    grip.addEventListener('touchstart',onDown,{passive:false});
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onUp);
  }
  // Double-click grip → reset to default
  grip.addEventListener('dblclick',()=>{ribbonVh=RIBBON_DEFAULT;applyRibbon(ribbonVh);persistRibbon(ribbonVh);});

  // Hook slide changes so ribbon refreshes on next/prev
  const _prevUH=updateHUD;updateHUD=function(){_prevUH();renderRibbon();};
})();
