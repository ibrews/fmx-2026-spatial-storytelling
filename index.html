@media (max-width:640px){.pr-body{font-size:.92rem;padding:8px 14px;line-height:1.45}.pr-head{padding:5px 14px}.pr-meta{font-size:.62rem;letter-spacing:.12em}}
/* === CURRENT SLIDE PREVIEW (?notes companion) === */
#na-slide-preview{overflow:hidden;transition:max-height .28s ease,opacity .28s ease,padding .28s ease;max-height:0;opacity:0;padding:0 14px;flex:0 0 auto}
#na-slide-preview.open{max-height:200px;opacity:1;padding:8px 14px 0}
#na-slide-preview .na-sp-label{font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:5px}
#na-slide-preview img{width:100%;border-radius:6px;display:block;border:1px solid rgba(255,255,255,.1)}
#na-slide-preview .na-sp-placeholder{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:rgba(255,255,255,.25);font-style:italic;border:1px dashed rgba(255,255,255,.1);border-radius:6px;text-align:center;padding:8px}
/* === EXPORT MODAL === */
#export-modal{position:fixed;inset:0;z-index:600;background:rgba(3,5,12,.88);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
#export-modal.open{opacity:1;pointer-events:all}
#export-modal .em-box{width:min(780px,92vw);max-height:84vh;overflow-y:auto;background:rgba(14,16,28,.98);border:1px solid rgba(0,212,255,.2);border-radius:16px;padding:36px 40px;font-family:var(--font);color:var(--text)}
#export-modal .em-title{font-size:1.3rem;font-weight:700;margin-bottom:6px}
#export-modal .em-sub{font-size:.72rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px}
#export-modal .em-section{margin-bottom:20px}
#export-modal .em-section h4{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
#export-modal .em-check{display:flex;align-items:flex-start;gap:8px;font-size:.82rem;color:rgba(240,244,255,.7);line-height:1.5;margin-bottom:6px}
#export-modal .em-check .em-box-icon{color:var(--dim);font-size:.9rem;flex-shrink:0}
#export-modal code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:3px;font-size:.78rem;font-family:'JetBrains Mono',monospace;color:var(--teal)}
#export-modal pre{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 14px;font-size:.72rem;font-family:'JetBrains Mono',monospace;color:rgba(240,244,255,.7);line-height:1.6;overflow-x:auto;margin:8px 0 12px}
#export-modal .em-tip{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:12px 14px;font-size:.78rem;color:rgba(245,158,11,.85);line-height:1.5;margin-top:16px}
#export-modal .em-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
#export-modal .em-btn{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--teal);font-family:var(--font);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;border-radius:6px;cursor:pointer;transition:all .15s}
#export-modal .em-btn:hover{background:rgba(0,212,255,.2)}
#export-modal .em-btn.primary{background:var(--teal);color:#060810;border-color:var(--teal)}
#export-modal .em-btn.primary:hover{background:#33dfff}
#export-modal .em-btn:disabled{opacity:.4;cursor:not-allowed}
#export-modal .em-progress{font-size:.72rem;color:var(--dim);margin-top:10px}
.cfg-btn-export{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);color:var(--teal);font-family:var(--font);font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;border-radius:6px;cursor:pointer;transition:all .15s;margin-top:8px}
.cfg-btn-export:hover{background:rgba(0,212,255,.18)}
/* === LAYOUT GRID OVERLAY === */
.layout-grid{position:absolute;inset:0;z-index:50;pointer-events:none;display:grid;grid-template:repeat(3,1fr)/repeat(4,1fr)}
.layout-grid-cell{border:1px dashed rgba(0,212,255,.2);display:flex;align-items:center;justify-content:center;font:700 1.2rem 'Space Grotesk',sans-serif;color:rgba(0,212,255,.25);letter-spacing:.1em}

/* === ?notes MODE — phone speaker companion === */
body.notes-mode #deck,body.notes-mode #counter,body.notes-mode #brand,body.notes-mode #step-indicator,body.notes-mode .nav-arrows,body.notes-mode #mobile-ui-toggle,body.notes-mode #slide-grid-zone,body.notes-mode #slide-grid,body.notes-mode #anno-toggle,body.notes-mode #move-toggle,body.notes-mode #notes-drawer,body.notes-mode #search-overlay,body.notes-mode .bg{display:none!important}
body.notes-mode html,body.notes-mode{overflow:hidden;background:#06080f;height:100vh;height:100dvh}
#notes-app{display:none;position:fixed;inset:0;z-index:9000;background:#06080f;color:#e8eeff;font-family:var(--font);flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
#notes-app textarea,#notes-app .na-script,#notes-app .na-bullets,#notes-app .na-doc-script,#notes-app input{user-select:auto;-webkit-user-select:auto;-webkit-touch-callout:default}
body.notes-mode #notes-app{display:flex}
.na-topbar{flex:0 0 auto;display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,12,24,.94);backdrop-filter:blur(8px);position:relative;z-index:20}
.na-next-pv{z-index:10!important}
.na-tb-l,.na-tb-r{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.na-slide-num{font-size:.78rem;font-weight:700;letter-spacing:.14em;color:#00d4ff;font-variant-numeric:tabular-nums;flex:0 0 auto}
.na-slide-title{font-size:.7rem;color:rgba(255,255,255,.5);max-width:34vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.na-time{display:flex;flex-direction:column;align-items:center;line-height:1.1;font-variant-numeric:tabular-nums}
.na-elapsed{font-size:1.25rem;font-weight:700;color:#fff;letter-spacing:.02em}
.na-target{font-size:.62rem;color:rgba(255,255,255,.45);letter-spacing:.08em;margin-top:2px}
.na-target.warn{color:#f59e0b}.na-target.late{color:#f43f5e}
.na-pace-dot{width:11px;height:11px;border-radius:50%;background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.7)}
.na-pace-dot.warn{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.7);animation:naBlink 1s infinite}
.na-pace-dot.late{background:#f43f5e;box-shadow:0 0 8px rgba(244,63,94,.85);animation:naBlink .55s infinite}
@keyframes naBlink{50%{opacity:.25}}
.na-iconbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#e8eeff;font:600 .82rem var(--font);height:34px;min-width:34px;padding:0 7px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .12s,background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;flex:0 0 auto}
.na-iconbtn.active{background:rgba(0,212,255,.22);border-color:rgba(0,212,255,.6);color:#00d4ff}
.na-iconbtn.danger{color:#f43f5e}
.na-iconbtn:hover{background:rgba(255,255,255,.12)}
.na-iconbtn:active{transform:scale(.92);background:rgba(0,212,255,.28)}
.na-iconbtn.holding{background:rgba(244,63,94,.25);border-color:#f43f5e;color:#fff}
.na-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1;padding:18px 18px 110px}
.na-content.editing{padding-bottom:160px}
.na-script{font-size:1.05rem;line-height:1.65;white-space:pre-wrap;color:rgba(240,244,255,.92)}
.na-script .na-over-mark{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#a78bfa;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.35);padding:2px 6px;border-radius:4px;margin:0 4px;vertical-align:1px}
.na-bullets{list-style:none;padding:0;margin:0}
.na-bullets li{font-size:1.18rem;line-height:1.5;padding:14px 4px 14px 28px;position:relative;border-bottom:1px solid rgba(255,255,255,.04)}
.na-bullets li:before{content:'';position:absolute;left:6px;top:24px;width:6px;height:6px;border-radius:50%;background:#00d4ff;opacity:.7}
.na-edit-textarea{width:100%;min-height:240px;background:rgba(255,255,255,.04);border:1px solid rgba(0,212,255,.3);border-radius:8px;color:#e8eeff;font:.95rem/1.55 var(--font);padding:14px;resize:vertical}
.na-edit-textarea:focus{outline:none;border-color:#00d4ff;background:rgba(0,212,255,.04)}
.na-next-pv{position:absolute;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:64px 1fr 64px;gap:8px;align-items:stretch;background:rgba(10,12,24,.85);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px;backdrop-filter:blur(8px);z-index:10!important}
.na-nav-btn{display:flex;align-items:center;justify-content:center;background:rgba(0,212,255,.14);border:1px solid rgba(0,212,255,.4);color:#00d4ff;font:700 1.7rem var(--font);border-radius:9px;cursor:pointer;transition:transform .12s,background .15s;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;line-height:1}
.na-nav-btn:active{background:rgba(0,212,255,.32);transform:scale(.92)}
.na-nav-btn:disabled{opacity:.25;cursor:default}
.na-next-info-wrap{display:flex;gap:8px;align-items:center;min-width:0;padding:0 4px}
.na-next-thumb{flex:0 0 auto;width:74px;height:44px;border-radius:5px;background:#0b0d18 center/cover no-repeat;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.3);letter-spacing:.1em;overflow:hidden}
.na-next-thumb img{width:100%;height:100%;object-fit:cover}
.na-next-info{flex:1;min-width:0}
.na-next-lbl{font-size:.55rem;font-weight:700;letter-spacing:.18em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:2px}
.na-next-title{font-size:.82rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.na-toast{position:fixed;left:50%;top:60px;transform:translateX(-50%) translateY(-12px);background:rgba(10,12,24,.95);border:1px solid rgba(0,212,255,.4);color:#00d4ff;font:600 .72rem var(--font);letter-spacing:.1em;padding:8px 14px;border-radius:7px;z-index:10000;opacity:0;transition:all .25s;pointer-events:none}
.na-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.na-doc{padding:16px 6px}
.na-doc-slide{margin-bottom:18px;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px 14px;background:rgba(255,255,255,.02)}
.na-doc-slide.current{border-color:rgba(0,212,255,.45);background:rgba(0,212,255,.04)}
.na-doc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.na-doc-num{font-size:.6rem;font-weight:700;letter-spacing:.18em;color:#00d4ff}
.na-doc-title{font-size:.95rem;font-weight:600;color:#fff;flex:1;margin:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.na-doc-script{font-size:.86rem;line-height:1.55;color:rgba(240,244,255,.78);white-space:pre-wrap;margin:0;border:1px solid transparent;padding:6px 8px;border-radius:5px;background:transparent;font-family:var(--font);width:100%;resize:vertical}
.na-doc-script:focus{outline:none;border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.03)}
.na-config-prompt{position:fixed;inset:0;z-index:11000;background:rgba(6,8,16,.96);display:flex;align-items:center;justify-content:center;padding:24px;flex-direction:column;gap:16px;text-align:center}
.na-config-prompt h2{font-size:1.1rem;color:#00d4ff;letter-spacing:.05em;font-weight:700}
.na-config-prompt p{font-size:.85rem;color:rgba(255,255,255,.65);line-height:1.55;max-width:480px}
.na-config-prompt code{font-size:.78rem;color:#a78bfa;background:rgba(167,139,250,.1);padding:2px 6px;border-radius:4px}
.na-target-pick{position:absolute;top:48px;right:14px;background:rgba(10,12,24,.95);border:1px solid rgba(0,212,255,.4);border-radius:8px;padding:14px;display:none;flex-direction:column;gap:10px;min-width:240px;z-index:50;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.na-target-pick.open{display:flex}
.na-target-pick label{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.4);text-transform:uppercase}
.na-target-pick input[type="time"],.na-target-pick input[type="number"]{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:#e8eeff;font:600 .9rem var(--font);padding:8px;border-radius:5px}
.na-target-pick .na-tp-row{display:flex;gap:8px;align-items:center}
.na-target-pick button{background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.4);color:#00d4ff;font:600 .72rem var(--font);letter-spacing:.1em;padding:8px;border-radius:5px;cursor:pointer;text-transform:uppercase}
.na-projected{font-size:.62rem;color:rgba(255,255,255,.5);letter-spacing:.05em;margin-top:6px}
.na-projected.late{color:#f43f5e}.na-projected.warn{color:#f59e0b}
.na-settings-drawer{position:absolute;top:48px;right:14px;background:rgba(10,12,24,.96);border:1px solid rgba(0,212,255,.4);border-radius:8px;padding:14px;display:none;flex-direction:column;gap:10px;min-width:240px;z-index:60;box-shadow:0 12px 40px rgba(0,0,0,.55)}
.na-settings-drawer.open{display:flex}
.na-settings-drawer label{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.45);text-transform:uppercase;display:block;margin-bottom:4px}
.na-settings-drawer select,.na-settings-drawer button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:#e8eeff;font:600 .8rem var(--font);padding:8px;border-radius:5px;width:100%;cursor:pointer}
.na-settings-drawer button.primary{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.4);color:#00d4ff;letter-spacing:.06em}
.na-settings-drawer button.danger{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.35);color:#f43f5e}
.na-settings-drawer .nasd-status{font-size:.65rem;color:rgba(255,255,255,.5);margin-top:4px;line-height:1.4}
@media (max-width:480px){.na-slide-title{display:none}.na-bullets li{font-size:1.05rem}}

/* === ANIMATED BACKGROUND OVERLAYS — driven by body[data-bg-style] === */
.bg-overlay{position:absolute;inset:0;display:none;pointer-events:none;mix-blend-mode:var(--bg-blend,screen);overflow:hidden}
body[data-bg-style="aurora"] .bg-overlay--aurora,
body[data-bg-style="ember"]  .bg-overlay--ember,
body[data-bg-style="ghost"]  .bg-overlay--ghost,
body[data-bg-style="nebula"] .bg-overlay--nebula,
body[data-bg-style="extreme"] .bg-overlay--extreme{display:block}
.bg-overlay .blob{position:absolute;border-radius:50%;will-change:transform}
/* Aurora */
.bg-overlay--aurora .blob{filter:blur(110px)}
.bg-overlay--aurora .b1{width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(0,212,255,.55),rgba(0,212,255,0));top:-10%;left:-10%;animation:bgAur1 26s linear infinite}
.bg-overlay--aurora .b2{width:48%;aspect-ratio:1;background:radial-gradient(circle,rgba(167,139,250,.5),rgba(167,139,250,0));top:30%;right:-10%;animation:bgAur2 32s linear infinite}
.bg-overlay--aurora .b3{width:62%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.32),rgba(245,158,11,0));bottom:-20%;left:10%;animation:bgAur3 38s linear infinite}
@keyframes bgAur1{0%{transform:translate(0,0)}25%{transform:translate(28vw,18vh)}50%{transform:translate(40vw,38vh)}75%{transform:translate(12vw,28vh)}100%{transform:translate(0,0)}}
@keyframes bgAur2{0%{transform:translate(0,0)}25%{transform:translate(-20vw,-15vh)}50%{transform:translate(-32vw,8vh)}75%{transform:translate(-15vw,22vh)}100%{transform:translate(0,0)}}
@keyframes bgAur3{0%{transform:translate(0,0)}25%{transform:translate(18vw,-15vh)}50%{transform:translate(28vw,-30vh)}75%{transform:translate(8vw,-18vh)}100%{transform:translate(0,0)}}
/* Ember */
.bg-overlay--ember .blob{filter:blur(140px);will-change:transform,opacity}
.bg-overlay--ember .b1{width:60%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.5),rgba(245,158,11,0));top:-15%;left:20%;animation:bgEm1 32s linear infinite,bgEmP1 9s ease-in-out infinite alternate}
.bg-overlay--ember .b2{width:50%;aspect-ratio:1;background:radial-gradient(circle,rgba(244,63,94,.35),rgba(244,63,94,0));bottom:-10%;right:-5%;animation:bgEm2 40s linear infinite,bgEmP2 12s ease-in-out infinite alternate}
.bg-overlay--ember .b3{width:40%;aspect-ratio:1;background:radial-gradient(circle,rgba(254,215,170,.18),rgba(254,215,170,0));top:50%;left:-10%;animation:bgEm3 36s linear infinite,bgEmP3 14s ease-in-out infinite alternate}
@keyframes bgEm1{0%{transform:translate(0,0)}25%{transform:translate(-15vw,18vh)}50%{transform:translate(-22vw,28vh)}75%{transform:translate(-8vw,18vh)}100%{transform:translate(0,0)}}
@keyframes bgEm2{0%{transform:translate(0,0)}25%{transform:translate(-18vw,-12vh)}50%{transform:translate(-28vw,-22vh)}75%{transform:translate(-12vw,-10vh)}100%{transform:translate(0,0)}}
@keyframes bgEm3{0%{transform:translate(0,0)}25%{transform:translate(28vw,-6vh)}50%{transform:translate(38vw,-12vh)}75%{transform:translate(20vw,-4vh)}100%{transform:translate(0,0)}}
@keyframes bgEmP1{0%{opacity:.7}100%{opacity:1}}
@keyframes bgEmP2{0%{opacity:.55}100%{opacity:1}}
@keyframes bgEmP3{0%{opacity:.5}100%{opacity:.95}}
/* Ghost */
.bg-overlay--ghost .blob{filter:blur(140px)}
.bg-overlay--ghost .b1{width:50%;aspect-ratio:1;background:radial-gradient(circle,rgba(180,210,255,.32),rgba(180,210,255,0));top:10%;left:5%;animation:bgGh1 28s linear infinite}
.bg-overlay--ghost .b2{width:42%;aspect-ratio:1;background:radial-gradient(circle,rgba(220,200,255,.28),rgba(220,200,255,0));top:30%;right:5%;animation:bgGh2 36s linear infinite}
.bg-overlay--ghost .b3{width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(160,180,220,.24),rgba(160,180,220,0));bottom:-5%;left:30%;animation:bgGh3 32s linear infinite}
.bg-overlay--ghost .b4{width:38%;aspect-ratio:1;background:radial-gradient(circle,rgba(200,210,250,.22),rgba(200,210,250,0));top:55%;left:-5%;animation:bgGh4 44s linear infinite}
@keyframes bgGh1{0%{transform:translate(0,0)}25%{transform:translate(20vw,12vh)}50%{transform:translate(28vw,-2vh)}75%{transform:translate(10vw,-12vh)}100%{transform:translate(0,0)}}
@keyframes bgGh2{0%{transform:translate(0,0)}25%{transform:translate(-15vw,14vh)}50%{transform:translate(-18vw,28vh)}75%{transform:translate(-6vw,16vh)}100%{transform:translate(0,0)}}
@keyframes bgGh3{0%{transform:translate(0,0)}25%{transform:translate(-12vw,-12vh)}50%{transform:translate(8vw,-22vh)}75%{transform:translate(14vw,-8vh)}100%{transform:translate(0,0)}}
@keyframes bgGh4{0%{transform:translate(0,0)}25%{transform:translate(22vw,-4vh)}50%{transform:translate(36vw,12vh)}75%{transform:translate(18vw,18vh)}100%{transform:translate(0,0)}}
/* Nebula */
.bg-overlay--nebula .blob{filter:blur(120px)}
.bg-overlay--nebula .swirl{position:absolute;inset:-25%;background:conic-gradient(from 0deg,rgba(0,212,255,.05),rgba(167,139,250,.04),rgba(245,158,11,.05),rgba(244,63,94,.04),rgba(0,212,255,.05));filter:blur(80px);will-change:transform;animation:bgNebSwirl 80s linear infinite}
.bg-overlay--nebula .b1{width:45%;aspect-ratio:1;background:radial-gradient(circle,rgba(0,212,255,.45),rgba(0,212,255,0));top:-5%;left:0;animation:bgNeb1 30s linear infinite}
.bg-overlay--nebula .b2{width:42%;aspect-ratio:1;background:radial-gradient(circle,rgba(167,139,250,.42),rgba(167,139,250,0));bottom:-5%;right:5%;animation:bgNeb2 36s linear infinite}
.bg-overlay--nebula .b3{width:35%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.28),rgba(245,158,11,0));top:50%;left:50%;animation:bgNeb3 26s linear infinite}
@keyframes bgNeb1{0%{transform:translate(0,0)}25%{transform:translate(22vw,18vh)}50%{transform:translate(32vw,8vh)}75%{transform:translate(14vw,-8vh)}100%{transform:translate(0,0)}}
@keyframes bgNeb2{0%{transform:translate(0,0)}25%{transform:translate(-18vw,-14vh)}50%{transform:translate(-28vw,4vh)}75%{transform:translate(-12vw,12vh)}100%{transform:translate(0,0)}}
@keyframes bgNeb3{0%{transform:translate(-50%,-50%)}25%{transform:translate(-30%,-58%)}50%{transform:translate(-22%,-42%)}75%{transform:translate(-58%,-44%)}100%{transform:translate(-50%,-50%)}}
@keyframes bgNebSwirl{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
/* Extreme — debug/proof option */
.bg-overlay--extreme .blob{filter:blur(70px)}
.bg-overlay--extreme .b1{width:60%;aspect-ratio:1;background:radial-gradient(circle,rgba(0,212,255,1),rgba(0,212,255,0));top:-15%;left:-15%;animation:bgExt1 7s linear infinite}
.bg-overlay--extreme .b2{width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(167,139,250,.95),rgba(167,139,250,0));top:25%;right:-15%;animation:bgExt2 9s linear infinite}
.bg-overlay--extreme .b3{width:65%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.85),rgba(245,158,11,0));bottom:-20%;left:5%;animation:bgExt3 11s linear infinite}
.bg-overlay--extreme .b4{width:50%;aspect-ratio:1;background:radial-gradient(circle,rgba(244,63,94,.85),rgba(244,63,94,0));top:40%;left:30%;animation:bgExt4 8s linear infinite}
@keyframes bgExt1{0%{transform:translate(0,0)}25%{transform:translate(50vw,30vh)}50%{transform:translate(70vw,60vh)}75%{transform:translate(20vw,40vh)}100%{transform:translate(0,0)}}
@keyframes bgExt2{0%{transform:translate(0,0)}25%{transform:translate(-40vw,-25vh)}50%{transform:translate(-60vw,15vh)}75%{transform:translate(-30vw,40vh)}100%{transform:translate(0,0)}}
@keyframes bgExt3{0%{transform:translate(0,0)}25%{transform:translate(40vw,-30vh)}50%{transform:translate(60vw,-50vh)}75%{transform:translate(20vw,-30vh)}100%{transform:translate(0,0)}}
@keyframes bgExt4{0%{transform:translate(0,0)}25%{transform:translate(-25vw,25vh)}50%{transform:translate(20vw,-25vh)}75%{transform:translate(35vw,15vh)}100%{transform:translate(0,0)}}

/* ── FMX TALK STYLES ── */

/* Gradient-text safety: fall back to white when gradient/clip-text isn't applying
   (Playfair Display + some browser/font combos drop the fill). When a user
   double-clicks to edit, undo the transparent fill so they can actually see
   the text they're typing. */
.fmx-cover-title,.case-slide.layout-big .big-text{color:#fff}
[contenteditable="true"]{-webkit-text-fill-color:currentColor!important;background:none!important;background-clip:initial!important;-webkit-background-clip:initial!important;color:#fff!important}

/* Avatar sprite — minimum viable port from harvardxr-keynote.
   Default state: arms down, no animation. */
.avatar .av-arms-up{visibility:hidden}
.avatar:not(.pumping) .av-arms-down{visibility:visible}
.avatar.arm-up .av-arms-down{visibility:hidden}
.avatar.arm-up .av-arms-up{visibility:visible}

/* Layout: sprite — pixel-art figure left, text right (HXR slide-2 spirit) */
.case-slide.layout-sprite{flex-direction:row;align-items:center;justify-content:center;gap:clamp(40px,5vw,90px);text-align:left;padding:clamp(50px,5vw,110px) clamp(60px,7vw,140px)}
.sprite-stage{flex:0 0 auto;width:clamp(220px,22vw,360px);height:clamp(280px,30vw,460px);display:flex;align-items:flex-end;justify-content:center}
.sprite-stage svg{width:100%;height:100%;display:block;image-rendering:pixelated;image-rendering:crisp-edges}
.sprite-content{flex:1;max-width:780px;display:flex;flex-direction:column;gap:14px}
.sprite-eyebrow{font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:rgba(244,63,94,.85);font-family:'Space Grotesk',sans-serif}
.sprite-name{font-size:clamp(2.4rem,5.2vw,5.4rem);font-weight:700;letter-spacing:-.02em;line-height:1;color:#fff}
.sprite-role{font-size:clamp(1rem,1.5vw,1.4rem);color:rgba(240,244,255,.65);font-style:italic;line-height:1.45;margin-bottom:8px}
.sprite-bullets{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:8px}
.sprite-bullets li{font-size:clamp(.95rem,1.3vw,1.25rem);line-height:1.5;color:rgba(240,244,255,.78);padding-left:20px;position:relative;font-family:'Space Grotesk',sans-serif}
.sprite-bullets li::before{content:'';position:absolute;left:0;top:.6em;width:6px;height:6px;border-radius:50%;background:rgba(244,63,94,.7)}
@media(max-width:900px){.case-slide.layout-sprite{flex-direction:column;text-align:center;padding:30px 20px}.sprite-stage{height:300px;width:230px}.sprite-bullets li{text-align:left}}


/* Cover — vibey, foregrounded color */
.fmx-cover{background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(244,63,94,.10) 0%,transparent 60%),radial-gradient(ellipse 60% 70% at 75% 70%,rgba(167,139,250,.12) 0%,transparent 60%)}
.fmx-cover-title{font-size:clamp(3.4rem,9.5vw,10rem);line-height:1.1;padding-bottom:.1em;letter-spacing:-.04em;background:linear-gradient(135deg,#fff 10%,#ffd6e1 35%,#a5d8ff 60%,#c5b6ff 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fmx-cover-title em{font-style:italic;font-weight:600;letter-spacing:-.02em}
.fmx-cover-sub{max-width:880px;margin-left:auto;margin-right:auto;line-height:1.45;font-style:italic}

/* Track speakers slide */
.fmx-track{padding:clamp(50px,5vw,110px) clamp(60px,7vw,140px)}
.fmx-track-title{font-size:clamp(2.4rem,5vw,5rem);margin:0 0 clamp(36px,4.5vw,72px) 0;letter-spacing:-.02em}
.speakers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:clamp(16px,1.8vw,28px);width:100%;max-width:1400px}.speakers-grid-2x2{grid-template-columns:1fr 1fr;max-width:1000px}
.speaker-tile{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:clamp(20px,2vw,32px);text-align:left;transition:transform .3s ease,border-color .3s ease}
.speaker-tile-us{background:linear-gradient(135deg,rgba(244,63,94,.18),rgba(167,139,250,.14));border-color:rgba(244,63,94,.45)}
.speaker-tile-tag{font-size:.65rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:rgba(244,63,94,.85);margin-bottom:14px}
.speaker-tile:not(.speaker-tile-us) .speaker-tile-tag{color:rgba(255,255,255,.45)}
.speaker-tile-name{font-size:clamp(1.1rem,1.6vw,1.55rem);font-weight:600;line-height:1.2;margin-bottom:8px}
.speaker-tile-org{font-size:.85rem;color:var(--dim);letter-spacing:.05em;text-transform:uppercase;font-weight:500}

/* Topics slide */
.fmx-topics{padding:clamp(50px,5vw,110px) clamp(60px,7vw,140px);text-align:left}
.fmx-topics .event-tag{align-self:flex-start}
.fmx-topics-title{font-size:clamp(2.4rem,5vw,5rem);margin:0 0 clamp(36px,4.5vw,64px) 0;align-self:flex-start;letter-spacing:-.02em}
.topics-list{display:flex;flex-direction:column;gap:clamp(14px,1.8vw,26px);width:100%;max-width:1100px}
.topic{display:grid;grid-template-columns:auto 1fr;gap:clamp(20px,2.5vw,40px);align-items:baseline;padding-bottom:clamp(14px,1.5vw,22px);border-bottom:1px solid rgba(255,255,255,.06)}
.topic-num{font-size:clamp(2rem,3.6vw,3.6rem);font-weight:300;letter-spacing:.05em;color:rgba(244,63,94,.6);font-family:'Space Grotesk',serif;font-style:italic;line-height:1}
.topic-name{font-size:clamp(1.3rem,2.2vw,2.2rem);font-weight:600;line-height:1.15;letter-spacing:-.01em}
.topic-name em{font-style:italic;color:rgba(245,158,11,.95)}
.topic-sub{font-size:clamp(.9rem,1.2vw,1.15rem);color:var(--dim);margin-top:6px;line-height:1.5}
.topics-thesis{margin-top:clamp(36px,4.5vw,72px);font-size:clamp(1rem,1.5vw,1.4rem);color:rgba(240,244,255,.55);font-style:italic;line-height:1.5;max-width:920px}
.topics-thesis em{color:rgba(255,255,255,.85);font-style:italic}

/* Layout: placed — items positioned absolutely with original PPT coordinates */
/* Stage maintains 16:9 (target = 1920x1080); items use left/top/width/height as % of stage */
.case-slide.layout-placed{display:flex;align-items:center;justify-content:center;padding:0;flex-direction:initial;text-align:center}
.placed-stage{position:relative;aspect-ratio:16/9;width:100%;height:auto;max-height:100%;max-width:calc(100vh*16/9);overflow:hidden}
.placed-item{position:absolute;overflow:hidden;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.placed-item img,.placed-item video{width:100%;height:100%;object-fit:contain;display:block}
.placed-overlay{position:absolute;left:5%;bottom:5%;background:rgba(6,8,16,.65);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);padding:14px 28px;border-radius:12px;z-index:5;max-width:80%}
.placed-title{font-size:clamp(1rem,1.7vw,1.5rem);font-weight:600;letter-spacing:-.01em;line-height:1.2}
.placed-sub{font-size:clamp(.8rem,1.1vw,1rem);color:rgba(240,244,255,.75);line-height:1.4;margin-top:4px}

/* Layout: full — full-bleed image/video with optional overlay */
.case-slide.layout-full{padding:0;flex-direction:column;gap:0;text-align:left;align-items:stretch;justify-content:stretch}
.case-slide.layout-full .full-media{position:absolute;inset:0;width:100%;height:100%;overflow:hidden}
.case-slide.layout-full .full-media img,.case-slide.layout-full .full-media video{width:100%;height:100%;object-fit:contain;display:block}
.case-slide.layout-full .full-overlay{position:absolute;left:clamp(40px,5vw,90px);bottom:clamp(40px,5vw,90px);right:clamp(40px,5vw,90px);max-width:920px;padding:clamp(20px,2vw,32px) clamp(24px,2.5vw,40px);background:rgba(6,8,16,.55);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:14px;z-index:2}
.case-slide.layout-full .full-title{font-size:clamp(1.4rem,2.6vw,2.6rem);font-weight:600;letter-spacing:-.015em;line-height:1.15;margin-bottom:8px}
.case-slide.layout-full .full-sub{font-size:clamp(.9rem,1.3vw,1.25rem);color:rgba(240,244,255,.75);line-height:1.45}

/* Layout: grid — multi-image artful grid */
/* Switch parent to CSS grid (head | grid | caption rows) so the inner .fmx-grid actually fills */
.case-slide.layout-grid{display:grid!important;grid-template-rows:auto 1fr auto;grid-template-columns:1fr;gap:clamp(14px,1.6vw,28px);text-align:center;padding:clamp(40px,4vw,80px) clamp(40px,4vw,90px);flex-direction:initial;align-items:stretch;justify-content:initial}
.case-slide.layout-grid .grid-head{text-align:center;align-self:start}
.case-slide.layout-grid .grid-title{font-size:clamp(1.5rem,2.8vw,2.8rem);font-weight:600;letter-spacing:-.015em;line-height:1.15;margin-bottom:6px}
.case-slide.layout-grid .grid-sub{font-size:clamp(.9rem,1.3vw,1.25rem);color:var(--dim);line-height:1.45;max-width:1100px;margin:0 auto}
.fmx-grid{display:grid;gap:clamp(10px,1.2vw,20px);width:100%;height:100%;min-height:0;min-width:0}
.case-slide.layout-grid .fmx-grid{grid-row:2}
.fmx-grid .grid-item{position:relative;overflow:hidden;border-radius:14px;background:rgba(255,255,255,.02);min-width:0;min-height:0}
.fmx-grid .grid-item img,.fmx-grid .grid-item video{width:100%;height:100%;object-fit:contain;display:block;border-radius:14px}
.case-slide.grid-cover .fmx-grid .grid-item img,.case-slide.grid-cover .fmx-grid .grid-item video{object-fit:cover}
.case-slide.grid-cover .placed-item img,.case-slide.grid-cover .placed-item video{object-fit:cover}
.case-slide.grid-cover .placed-item{border-radius:0;box-shadow:none}
.fmx-grid--n1{grid-template-columns:1fr;grid-template-rows:1fr}
.fmx-grid--n2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
.fmx-grid--n3{grid-template-columns:repeat(3,1fr);grid-template-rows:1fr}
.fmx-grid--n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.fmx-grid--n5{grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
.fmx-grid--n5 .grid-item:nth-child(1){grid-column:span 2}
.fmx-grid--n6{grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
.fmx-grid--n7{grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr}
.fmx-grid--n7 .grid-item:nth-child(1){grid-column:span 1;grid-row:span 1}
.fmx-grid--n14,.fmx-grid--n8,.fmx-grid--n9{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
.fmx-grid--n10,.fmx-grid--n11,.fmx-grid--n12,.fmx-grid--n13{grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr}
.case-slide.layout-grid .grid-caption{font-size:clamp(1rem,1.6vw,1.6rem);color:rgba(255,255,255,.7);font-style:italic;margin-top:8px;letter-spacing:.01em}

/* Layout: big — centered statement */
.case-slide.layout-big{flex-direction:column;text-align:center;padding:clamp(50px,5vw,110px);justify-content:center;align-items:center}
.case-slide.layout-big .big-stack{display:flex;flex-direction:column;gap:clamp(18px,2.5vw,40px);align-items:center;max-width:1300px}
.case-slide.layout-big .big-eyebrow{font-size:clamp(1.4rem,2.6vw,2.4rem);font-weight:500;color:rgba(240,244,255,.78);letter-spacing:-.01em;line-height:1.2}
.case-slide.layout-big .big-sub{font-size:clamp(.95rem,1.5vw,1.4rem);color:var(--dim);font-style:italic;line-height:1.45}
.case-slide.layout-big .big-text{font-size:clamp(3rem,8vw,8rem);font-weight:700;letter-spacing:-.04em;line-height:1.15;background:linear-gradient(135deg,#fff 30%,#ffd6e1 70%,#c5b6ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.case-slide.layout-big .big-caption{font-size:clamp(1rem,1.6vw,1.55rem);color:rgba(240,244,255,.65);font-style:italic;line-height:1.45;max-width:900px}
.accent-amber.layout-big .big-text{background:linear-gradient(135deg,#fff 30%,#ffe6a5 70%,#f59e0b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.accent-purple.layout-big .big-text{background:linear-gradient(135deg,#fff 30%,#ddd2ff 70%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* Avatar arm-pump disabled — HXR walk/powerup animation replaces it */
.avatar .av-arms-down{visibility:visible}
.avatar .av-arms-up{visibility:hidden}
/* Topics slide — stagger reveal on activation */
@keyframes topicReveal{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.fmx-topics.active .fmx-topics-title{animation:topicReveal .55s ease forwards;opacity:0}
.fmx-topics.active .topic{animation:topicReveal .5s ease forwards;opacity:0}
.fmx-topics.active .topic:nth-child(1){animation-delay:.18s}
.fmx-topics.active .topic:nth-child(2){animation-delay:.38s}
.fmx-topics.active .topic:nth-child(3){animation-delay:.58s}
.fmx-topics.active .topic:nth-child(4){animation-delay:.78s}
/* HXR Alex intro — faithful port */
.slide.layout-intro-hxr{padding:0;align-items:stretch;justify-content:stretch}
.intro-grid{display:flex;align-items:center;gap:clamp(40px,5vw,90px);width:100%;max-width:1500px;padding:clamp(50px,5vw,90px) clamp(60px,7vw,140px)}
.intro-stage{flex:0 0 42%;max-width:560px;aspect-ratio:1/1;position:relative}
.intro-stage svg{width:100%;height:100%}
.intro-content{flex:1;text-align:left}
.intro-eyebrow{font-size:clamp(.7rem,1.2vw,1rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--rose);margin-bottom:24px}
.intro-title{font-size:clamp(2.6rem,5.5vw,5.2rem);font-weight:700;line-height:1.02;letter-spacing:-.02em;margin-bottom:24px;background:linear-gradient(130deg,#fff 20%,#ffd6e1 55%,#c5b6ff 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.intro-sub{font-size:clamp(1rem,1.6vw,1.4rem);color:var(--dim);line-height:1.55;margin-bottom:32px;max-width:600px}
.intro-stats{display:flex;gap:16px;flex-wrap:nowrap}
.intro-stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:18px 22px;flex:1;min-width:0}
.intro-stat .num{display:block;font-size:clamp(1.4rem,2.2vw,2rem);font-weight:700;color:var(--rose);letter-spacing:-.02em;margin-bottom:6px}
.intro-stat .lbl{display:block;font-size:clamp(.62rem,.85vw,.78rem);font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);line-height:1.3}
.intro-stage .stage-floor{fill:rgba(244,63,94,.12);stroke:rgba(244,63,94,.3);stroke-width:1}
.intro-stage .stage-walker{transform-origin:center bottom}
#alex-intro-anim{transform-box:fill-box;transform-origin:center bottom}
@keyframes ue5JumpUp{0%{transform:translate(0,0) scale(1.5)}25%{transform:translate(0,-20px) scale(1.4,1.6)}100%{transform:translate(0,-130px) scale(1.5)}}
@keyframes ue5PowerUp{0%{transform:translate(0,-130px) scale(1.5);filter:brightness(1)}30%{transform:translate(0,-130px) scale(1.8);filter:brightness(1.7)}55%{transform:translate(0,-130px) scale(1.4);filter:brightness(1.3)}100%{transform:translate(0,-130px) scale(2);filter:brightness(1)}}
@keyframes ue5FallDown{0%{transform:translate(0,-130px) scale(2)}100%{transform:translate(0,0) scale(2)}}

/* Intro animation keyframes (HXR-style walk/jump/powerup) */
@keyframes introWalk{0%{transform:translate(-200px,0)}100%{transform:translate(160px,0)}}
@keyframes introJumpUp{0%{transform:translate(160px,0) scale(1,1)}30%{transform:translate(160px,-16px) scale(.95,1.05)}100%{transform:translate(160px,-80px) scale(1,1)}}
@keyframes introFallDown{0%{transform:translate(160px,-80px) scale(1.4)}100%{transform:translate(160px,0) scale(1.4)}}
@keyframes introPowerUp{0%{transform:translate(160px,-80px) scale(1);filter:brightness(1)}35%{transform:translate(160px,-80px) scale(1.2);filter:brightness(1.8)}60%{transform:translate(160px,-80px) scale(1.1);filter:brightness(1.3)}100%{transform:translate(160px,-80px) scale(1.4);filter:brightness(1)}}
@keyframes introHeadsetBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes introHeadsetGrab{0%{opacity:1;transform:scale(1)}50%{opacity:1;transform:scale(1.3) translateY(-8px)}100%{opacity:0;transform:scale(0) translateY(-24px)}}
@keyframes introSparkle{0%{opacity:0;transform:translate(0,0) scale(.3)}12%{opacity:1;transform:translate(calc(var(--tx)*.15),calc(var(--ty)*.15)) scale(1.5)}55%{opacity:1;transform:translate(calc(var(--tx)*.6),calc(var(--ty)*.6)) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3)}}
@keyframes introFlash{0%{opacity:0}8%{opacity:.7}100%{opacity:0}}
/* Sprite stage: expanded to full height for animation */
.sprite-stage.anim-expanded{flex:1;width:auto;min-width:340px;max-width:55%}
.sprite-stage.anim-expanded svg{width:100%;height:100%;viewbox:unset}
/* Orbit slide */
.carol-diagram-stage{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:clamp(18px,2.4vh,36px) clamp(20px,2.6vw,42px)}
.ccvr-wrap{width:100%;height:100%;display:flex;flex-direction:column;gap:clamp(10px,1.5vh,18px);min-height:0}
.ccvr-head{text-align:center;flex:0 0 auto}

.ccvr-head h2 .ccvr-sub{color:rgba(240,244,255,.4);font-weight:500}

.ccvr-ysub{font-family:'Space Grotesk',sans-serif;font-size:clamp(.55rem,.78vw,.7rem);color:rgba(240,244,255,.48);font-weight:500;letter-spacing:.06em;margin-top:1px}

      s.innerHTML=`<div class="big-stack">${c.title?`<h2 class="big-eyebrow">${c.title.replace(/\n/g,'<br>')}</h2>`:''}${c.subtitle?`<div class="big-sub">${c.subtitle}</div>`:''}${c.bigText?`<h1 class="big-text">${c.bigText.replace(/\n/g,'<br>')}</h1>`:''}${c.bigCaption?`<p class="big-caption">${c.bigCaption}</p>`:''}</div>`;
    } else if(c.layout==='grid'&&c.images&&c.images.length){
      // Grid layout — multi-image artful arrangement
      const n=c.images.length;
      const items=c.images.map(src=>{const [s,pos]=Array.isArray(src)?src:[src,null];const sty=pos?` style="object-position:${pos}"`:'';return `<div class="grid-item">${mediaTag(s).replace(/>$/,`${sty}>`)}</div>`;}).join('');
      const head=(c.title||c.subtitle)?`<div class="grid-head">${c.title?`<h3 class="grid-title">${c.title.replace(/\n/g,'<br>')}</h3>`:''}${c.subtitle?`<p class="grid-sub">${c.subtitle}</p>`:''}</div>`:'';
      const cap=c.caption?`<div class="grid-caption">${c.caption}</div>`:'';
      s.innerHTML=`${head}<div class="fmx-grid fmx-grid--n${n}">${items}</div>${cap}`;
    } else if(c.layout==='placed'&&c.placedImages){
      // Placed layout — items positioned absolutely with original PPT coordinates (% of 16:9 stage)
      const items=c.placedImages.map(([src,l,t,w,h,op])=>{const tag=mediaTag(src);const st=op?tag.replace(/>$/,` style="object-position:${op}">`):tag;return `<div class="placed-item" style="left:${l}%;top:${t}%;width:${w}%;height:${h}%">${st}</div>`;}).join('');
      const head=(c.title||c.subtitle)?`<div class="placed-overlay">${c.title?`<h3 class="placed-title">${c.title.replace(/\n/g,'<br>')}</h3>`:''}${c.subtitle?`<p class="placed-sub">${c.subtitle}</p>`:''}</div>`:'';
      s.innerHTML=`<div class="placed-stage">${items}</div>${head}`;
    } else if(c.layout==='orbit'){

    } else if(c.layout==='full'&&c.img){

      s.innerHTML=`<div class="full-media">${mediaTag(c.img)}</div>${(c.title||c.subtitle)?`<div class="full-overlay">${c.title?`<h3 class="full-title">${c.title.replace(/\n/g,'<br>')}</h3>`:''}${c.subtitle?`<p class="full-sub">${c.subtitle}</p>`:''}</div>`:''}`;
    } else if(c.layout==='carol-diagram'){
      s.innerHTML='<div class="carol-diagram-stage"></div>';
    } else {
      // Default 2-pane case slide (existing behavior + .mp4 support + no-image variant)
      let imgHTML;
      if(c.img&&c.img.startsWith('IFRAME:')){
        const iframeSrc=c.img.slice(7);
        imgHTML=`<iframe src="${iframeSrc}" style="width:100%;height:100%;border:none;border-radius:18px" allow="autoplay;fullscreen;xr-spatial-tracking" allowfullscreen></iframe>`;
      } else if(c.img&&/\.(mp4|webm|mov)$/i.test(c.img)){
        imgHTML=`<video src="${c.img}" autoplay loop ${c.audioUnmuted?'':'muted '}playsinline preload="none"${c.audioUnmuted?' data-default-unmuted="1"':''} style="width:100%;height:100%;object-fit:cover;border-radius:18px"></video>`;
      } else if(c.img&&c.img!=='MEDIA_CYCLER'){
        imgHTML=`<img src="${c.img}" loading="lazy" style="border-radius:18px">`;

      } else {
        imgHTML='';
        s.classList.add('case-noimg');
      }

    }

let _introAudioCtx = null;
function playIntroPowerUpSfx(){
  try{if(!_introAudioCtx)_introAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ctx=_introAudioCtx;if(ctx.state==='suspended')ctx.resume();
  const now=ctx.currentTime;
  const tone=(freq,start,dur,type='square',vol=0.12)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(vol,now+start);g.gain.exponentialRampToValueAtTime(0.001,now+start+dur);o.start(now+start);o.stop(now+start+dur+0.01);};
  const seq=[[130,.00,.09],[196,.08,.09],[262,.16,.09],[349,.24,.09],[523,.32,.09],[698,.40,.09],[1047,.48,.12],[784,.61,.18,'sine',.08],[1047,.80,.25,'sine',.1]];
  seq.forEach(([f,s,d,t,v])=>tone(f,s,d,t||'square',v||0.12));}catch(e){}}

let _fbAudioCtx=null;
function playZapSfx(){
  try{if(!_fbAudioCtx)_fbAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ctx=_fbAudioCtx;if(ctx.state==='suspended')ctx.resume();
  const now=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(200,now+.15);
  o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
  o.start(now);o.stop(now+.15);}catch(e){}}

let _tallyAudioCtx=null;
function playTallyTick(){try{if(!_tallyAudioCtx)_tallyAudioCtx=new(window.AudioContext||window.webkitAudioContext)();const ctx=_tallyAudioCtx;if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.04,now);g.gain.exponentialRampToValueAtTime(.001,now+.06);o.connect(g);g.connect(ctx.destination);o.start(now);o.stop(now+.07);}catch(e){}}
function playTallyChing(){try{if(!_tallyAudioCtx)_tallyAudioCtx=new(window.AudioContext||window.webkitAudioContext)();const ctx=_tallyAudioCtx;if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime;[[1047,0,.18],[1319,.05,.18],[1568,.1,.25]].forEach(([f,s,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.06,now+s);g.gain.exponentialRampToValueAtTime(.001,now+s+d);o.connect(g);g.connect(ctx.destination);o.start(now+s);o.stop(now+s+d+.01);});}catch(e){}}

function animateTally(el){
  const orig=el.dataset.tally||el.textContent.trim();el.dataset.tally=orig;
  const m=orig.match(/^(\d+)(\+?)$/);if(!m)return;
  const target=parseInt(m[1],10),suffix=m[2]||'',dur=1000,start=performance.now();
  el.style.display='inline-block';el.style.willChange='transform';
  let _last=-1;
  function frame(t){const k=Math.min(1,(t-start)/dur),eased=1-Math.pow(1-k,3),cur=Math.round(eased*target);
    el.textContent=cur+(k>=1?suffix:'');
    if(cur!==_last&&k<1){playTallyTick();_last=cur;}
    let y=0,sx=1,sy=1;
    if(k<.85){y=-Math.sin((k/.85)*Math.PI)*14;}
    else{const lk=(k-.85)/.15;sy=1-.12*Math.sin(lk*Math.PI);sx=1+.12*Math.sin(lk*Math.PI);}
    el.style.transform=`translateY(${y.toFixed(2)}px) scale(${sx.toFixed(3)},${sy.toFixed(3)})`;
    if(k<1)requestAnimationFrame(frame);else{el.style.transform='';playTallyChing();}}
  requestAnimationFrame(frame);
}
function primeTallies(slide){if(!slide)return;slide.querySelectorAll('.num').forEach(el=>{const orig=el.dataset.tally||el.textContent.trim();el.dataset.tally=orig;if(/^\d+\+?$/.test(orig))el.textContent='0';});}
function playTallies(slide){if(!slide)return;slide.querySelectorAll('.num').forEach(animateTally);}

(function(){const bar=document.createElement('div');bar.id='anim-scrub-bar';bar.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:1100;display:none;align-items:center;gap:10px;background:rgba(6,8,16,.92);border:1px solid rgba(245,158,11,.4);border-radius:10px;padding:10px 14px;backdrop-filter:blur(10px);font-family:var(--font);font-size:.7rem;color:var(--amber)';bar.innerHTML=`<button id="scrub-replay" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 10px;font:inherit;cursor:pointer">Replay</button><button id="scrub-pp" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 10px;font:inherit;cursor:pointer;width:70px">Pause</button><div id="scrub-track" style="position:relative;width:360px;height:28px;display:flex;align-items:center"><input id="scrub-r" type="range" min="0" max="5000" value="0" step="10" style="width:100%;accent-color:var(--amber);position:relative;z-index:2"><div id="kf-markers" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1"></div></div><span id="scrub-t" style="min-width:60px;text-align:right;color:rgba(245,158,11,.8)">0 ms</span><button id="kf-set" title="Set keyframe for last-moved element at current time" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 8px;font:inherit;cursor:pointer">◆ KF</button><button id="kf-del" title="Delete keyframe at current time" style="background:rgba(244,63,94,.15);color:var(--rose);border:1px solid rgba(244,63,94,.4);border-radius:5px;padding:5px 8px;font:inherit;cursor:pointer;display:none">✕ KF</button>`;document.body.appendChild(bar);const rng=bar.querySelector('#scrub-r'),tl=bar.querySelector('#scrub-t'),pp=bar.querySelector('#scrub-pp'),rp=bar.querySelector('#scrub-replay');let paused=false;function sa(){const s=allSlides[current];return s?.getAnimations?.({subtree:true})||[];}rng.addEventListener('input',()=>{paused=true;pp.textContent='Play';const v=+rng.value;tl.textContent=v+' ms';sa().forEach(a=>{a.pause();try{a.currentTime=v;}catch(e){}});if(window._kfUpdateDel)window._kfUpdateDel(v);});pp.addEventListener('click',()=>{paused=!paused;if(paused){sa().forEach(a=>a.pause());pp.textContent='Play';}else{sa().forEach(a=>a.play());pp.textContent='Pause';}});rp.addEventListener('click',()=>{paused=false;pp.textContent='Pause';if(window._kfRebuild)window._kfRebuild();const n=current;if(n>0){goTo(n-1);setTimeout(()=>goTo(n),560);}if(window._kfRenderMarkers)setTimeout(window._kfRenderMarkers,1200);});window.scrubShow=(on)=>{bar.style.display=on?'flex':'none';if(on&&window._kfRenderMarkers)setTimeout(window._kfRenderMarkers,100);};window._scrubPaused=()=>paused;window._scrubTime=()=>+rng.value;window._scrubRange=()=>rng;})();

// ── Keyframe animation system ──
(function(){
  const kfStore=new Map(),kfAnims=new Map();
  const markers=document.getElementById('kf-markers'),delBtn=document.getElementById('kf-del'),setBtn=document.getElementById('kf-set');
  setBtn?.addEventListener('click',()=>{
    if(!_lastMoveEl){annoToast('Move an element first, then click ◆ KF');return;}
    const xform=gX(_lastMoveEl);
    window.kfAddKeyframe(_lastMoveEl,xform);
  });

  window._kfUpdateDel=function(time){
    let has=false;
    kfStore.forEach(kfs=>{if(kfs.some(k=>k.slide===current&&Math.abs(k.time-time)<20))has=true;});
    delBtn.style.display=has?'inline-block':'none';
  };

  window._kfRenderMarkers=function(){
    if(!markers)return;markers.innerHTML='';
    const rng=window._scrubRange?.();const max=rng?+rng.max:5000;
    kfStore.forEach(kfs=>{
      kfs.filter(k=>k.slide===current).forEach(kf=>{
        const pct=(kf.time/max)*100;
        const d=document.createElement('div');
        d.style.cssText=`position:absolute;left:${pct}%;top:50%;width:8px;height:8px;background:var(--amber);transform:translate(-50%,-50%) rotate(45deg);border-radius:1px;opacity:.85;pointer-events:none`;
        markers.appendChild(d);
      });
    });
  };

  function buildAnim(el,sel,slideIdx){
    const old=kfAnims.get(sel);if(old)old.cancel();
    const kfs=(kfStore.get(sel)||[]).filter(k=>k.slide===slideIdx);
    if(kfs.length<2)return;
    const dur=kfs[kfs.length-1].time-kfs[0].time;if(dur<=0)return;
    const t0=kfs[0].time;
    const frames=kfs.map(kf=>({
      transform:`translate(${kf.tx}px,${kf.ty}px) rotate(${kf.rot}deg) scale(${kf.scale})`,
      offset:(kf.time-t0)/dur,
    }));
    el.style.transform='';el.style.transformBox='fill-box';el.style.transformOrigin='center center';
    const anim=el.animate(frames,{duration:dur,delay:t0,fill:'both',easing:'ease-in-out'});
    if(window._scrubPaused?.()){anim.pause();try{anim.currentTime=Math.max(0,(window._scrubTime?.()??0)-t0);}catch(e){}}
    kfAnims.set(sel,anim);tMap.delete(el);
  }

  window._kfRebuild=function(){
    kfAnims.forEach(a=>a.cancel());kfAnims.clear();
    kfStore.forEach((kfs,sel)=>{
      if(kfs.filter(k=>k.slide===current).length>=2){
        const el=document.querySelector(sel);if(el)buildAnim(el,sel,current);
      }
    });
  };

  window.kfAddKeyframe=function(el,xform){
    const sel=aSel(el),time=window._scrubTime?.()??0;
    if(!kfStore.has(sel))kfStore.set(sel,[]);
    const kfs=kfStore.get(sel);
    const idx=kfs.findIndex(k=>k.slide===current&&Math.abs(k.time-time)<5);
    const kf={slide:current,time,tx:xform.tx,ty:xform.ty,scale:xform.scale,rot:xform.rot};
    if(idx>=0)kfs[idx]=kf;else kfs.push(kf);
    kfs.sort((a,b)=>a.time-b.time);
    const slideKfs=kfs.filter(k=>k.slide===current);
    if(slideKfs.length>=2)buildAnim(el,sel,current);
    // Extend scrubber if needed
    const rng=window._scrubRange?.();if(rng&&time>+rng.max)rng.max=time;
    window._kfRenderMarkers();saveKf();
    annoToast(`◆ Keyframe at ${time}ms (${slideKfs.length} total)`);
  };

  delBtn?.addEventListener('click',()=>{
    const time=window._scrubTime?.()??0;let deleted=false;
    kfStore.forEach((kfs,sel)=>{
      const idx=kfs.findIndex(k=>k.slide===current&&Math.abs(k.time-time)<20);
      if(idx>=0){kfs.splice(idx,1);deleted=true;
        const rem=kfs.filter(k=>k.slide===current);
        if(rem.length<2){const a=kfAnims.get(sel);if(a){a.cancel();kfAnims.delete(sel);}}
        else{const el=document.querySelector(sel);if(el)buildAnim(el,sel,current);}
        if(!kfs.length)kfStore.delete(sel);
      }
    });
    if(deleted){window._kfRenderMarkers();saveKf();delBtn.style.display='none';annoToast(`Keyframe deleted at ${time}ms`);}
  });

  function saveKf(){
    const arr=aL().filter(a=>a.type!=='keyframe');
    kfStore.forEach((kfs,sel)=>{if(kfs.length)arr.push({selector:sel,context:`keyframes (${kfs.length})`,text:'KEYFRAMES '+kfs.map(k=>k.time+'ms').join(', '),timestamp:new Date().toISOString(),type:'keyframe',keyframes:kfs});});
    aS(arr);aRender();
  }
  function loadKf(){
    kfStore.clear();
    aL().filter(a=>a.type==='keyframe').forEach(a=>{if(a.keyframes&&a.selector)kfStore.set(a.selector,a.keyframes);});
  }
  window.kfOnSlideEnter=function(){loadKf();setTimeout(()=>{window._kfRebuild?.();window._kfRenderMarkers?.();},500);};
})();

// FEATURE: TALK DURATION ESTIMATOR
// =====================================================================
function estimateSlideDuration(idx){
  const notes=getSlideNotes(idx);
  const sl=allSlides[idx];
  const ty=sl?.dataset.type||'';
  let seconds=0;
  if(!notes||notes.trim()===''){
    seconds=30; // no notes default
  }else{
    const lines=notes.split('\n').filter(l=>l.trim());
    lines.forEach(line=>{
      const trimmed=line.trim();
      const isBullet=/^[-\u2022*]/.test(trimmed);
      const wordCount=trimmed.split(/\s+/).length;
      if(isBullet||wordCount<15){
        seconds+=20; // bullet point: ~20s
      }else{
        seconds+=Math.ceil(wordCount/150*60); // full sentence: words/150 WPM
      }
    });
  }
  // Lesson slides: add 10 seconds natural pause
  if(ty==='lesson'||ty==='bonus')seconds+=10;
  // Steps: add 5s per step beyond first
  const ss=slideSteps.get(sl);
  if(ss&&ss.steps.length>1)seconds+=(ss.steps.length-1)*5;
  return seconds;
}

function calcTotalDuration(){
  let total=0;
  for(let i=0;i<allSlides.length;i++){
    if(allSlides[i].dataset.hidden==='1')continue;
    total+=estimateSlideDuration(i);
  }
  return total;
}

function fmtTime(secs){
  const m=Math.floor(secs/60),s=Math.floor(secs%60);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function updateDurationDisplay(){
  const el=document.getElementById('v-duration');
  if(el)el.textContent='~'+fmtTime(calcTotalDuration());
}

// Timer & pacing
let _timerInterval=null;

  if(_talkStartTime)return;
  _talkStartTime=Date.now();
  _timerInterval=setInterval(updateTimers,1000);
}
function updateTimers(){
  if(!_talkStartTime)return;
  const elapsedSec=Math.floor((Date.now()-_talkStartTime)/1000);
  const totalEst=calcTotalDuration();
  const remainSec=Math.max(0,totalEst-elapsedSec);
  const elapsed=fmtTime(elapsedSec);
  const remaining='~'+fmtTime(remainSec);
  let paceIcon='\uD83D\uDFE2'; // green
  if(elapsedSec>totalEst*1.25)paceIcon='\uD83D\uDD34'; // red 25%+
  else if(elapsedSec>totalEst*1.1)paceIcon='\uD83D\uDFE1'; // yellow 10%+
  // Haptic pacing alerts (mobile only \u2014 navigator.vibrate is no-op on desktop)
  if(remainSec<60&&remainSec>0){
    // Last minute: hard double-pulse every 10 seconds
    const tenSec=Math.floor(elapsedSec/10);
    if(tenSec!==_lastVibTenSec){_lastVibTenSec=tenSec;navigator.vibrate?.([250,80,250]);}
  }else if(elapsedSec>totalEst*1.1){
    // Running behind by >10%: single light pulse once per minute
    const minute=Math.floor(elapsedSec/60);
    if(minute!==_lastVibMinute){_lastVibMinute=minute;navigator.vibrate?.(120);}
  }
  const data={type:'timer-update',elapsed,remaining,paceIcon};
  _notesCh.postMessage(data);
  if(_notesWin&&!_notesWin.closed){
    const doc=_notesWin.document;
    if(doc.getElementById('pn-elapsed')){
      doc.getElementById('pn-elapsed').textContent=elapsed;
      doc.getElementById('pn-remain').textContent=remaining;
      doc.getElementById('pn-pace-icon').textContent=paceIcon;
    }
  }
}

async function runInlineExport(){
  const prog=document.getElementById('em-progress');
  const btn=document.getElementById('em-inline');
  btn.disabled=true;
  prog.textContent='Fetching external resources...';
  try{
    // Clone the document
    const html=document.documentElement.cloneNode(true);
    // Inline Google Fonts
    const fontLinks=html.querySelectorAll('link[href*="fonts.googleapis"]');
    for(const link of fontLinks){
      try{
        prog.textContent='Fetching fonts from '+link.href.substring(0,60)+'...';
        const resp=await fetch(link.href);
        const css=await resp.text();
        // Fetch each woff2 url and convert to base64
        const urls=[...css.matchAll(/url\(([^)]+)\)/g)].map(m=>m[1]);
        let inlinedCSS=css;
        for(const url of urls){
          try{
            const fontResp=await fetch(url);
            const blob=await fontResp.blob();
            const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
            inlinedCSS=inlinedCSS.replace(url,b64);
          }catch(e){/* skip individual font */}
        }
        const style=document.createElement('style');
        style.textContent=inlinedCSS;
        link.parentNode.replaceChild(style,link);
      }catch(e){/* skip font link */}
    }
    // Inline QR codes
    const qrImgs=html.querySelectorAll('img[src*="api.qrserver"]');
    for(const img of qrImgs){
      try{
        prog.textContent='Fetching QR code...';
        const resp=await fetch(img.src);
        const blob=await resp.blob();
        const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
        img.src=b64;
      }catch(e){/* skip */}
    }
    // Remove preconnect links
    html.querySelectorAll('link[rel="preconnect"]').forEach(l=>l.remove());
    // Build download blob
    prog.textContent='Building self-contained file...';
    const blob=new Blob(['<!DOCTYPE html>\n'+html.outerHTML],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='spatial-deck-offline.html';
    a.style.cssText='display:inline-block;margin-top:10px;color:var(--teal);font-weight:600;font-size:.82rem;text-decoration:underline;cursor:pointer;';
    a.textContent='Download spatial-deck-offline.html ('+Math.round(blob.size/1024)+' KB)';
    prog.textContent='';
    prog.appendChild(a);
    btn.disabled=false;
  }catch(e){
    prog.textContent='Error: '+e.message;
    btn.disabled=false;
  }
}

// =====================================================================
// Wraps buildMediaCycler: any item whose src ends in .gif gets swapped for

// for GIF items only — fade-in instead. Other items still use the canvas
// pipeline unchanged.
(function(){
  const _origBMC=buildMediaCycler;
  window.buildMediaCycler=function(sl,items,opts){
    const hasGif=Array.isArray(items)&&items.some(it=>it&&it.type==='image'&&it.src&&/\.gif(\?|$)/i.test(it.src));
    if(!hasGif)return _origBMC(sl,items,opts);
    // Mixed mode: render a stack of <img>/<video> elements with cross-fade.
    const mount=sl.querySelector('.media-cycler-mount');if(!mount)return;
    const portrait=opts&&opts.portrait;const imageDuration=(opts&&opts.imageDuration)||6000;
    mount.style.cssText='position:relative;width:100%;'+(portrait?'aspect-ratio:338/600':'aspect-ratio:16/10')+';border-radius:18px;overflow:hidden';
    const layers=items.map((it,i)=>{
      let el;
      if(it.type==='video'){el=document.createElement('video');el.src=it.src;el.muted=true;el.playsInline=true;el.loop=!!it.loop;el.preload='metadata';}
      else if(it.type==='image'){el=document.createElement('img');el.src=it.src;el.loading='lazy';}
      else {el=document.createElement('div');el.style.background=`linear-gradient(135deg,${it.color1||'rgba(0,212,255,.18)'},${it.color2||'rgba(6,8,16,.4)'})`;el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center';if(it.label){el.textContent=it.label;el.style.color='rgba(255,255,255,.18)';el.style.font='600 .85rem var(--font)';el.style.letterSpacing='.1em';el.style.textTransform='uppercase';}}
      el.style.cssText+=';position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:'+(i===0?'1':'0')+';transition:opacity .9s ease';
      mount.appendChild(el);return el;
    });
    if(items.length<=1)return;
    let idx=0;
    setInterval(()=>{
      layers[idx].style.opacity='0';
      const v=layers[idx];if(v.tagName==='VIDEO')try{v.pause();}catch(_){}
      idx=(idx+1)%layers.length;
      layers[idx].style.opacity='1';
      const nv=layers[idx];if(nv.tagName==='VIDEO')try{nv.currentTime=0;nv.play().catch(()=>{});}catch(_){}
      try{playBing&&playBing();}catch(_){}
    },imageDuration);

  };
})();

// (over video) marker · adaptive WPM · projected wall-clock finish
// =====================================================================
const OVER_VIDEO_RE=/\(\s*over\s+video\s*\)/i;
window._notesOverrides=new Map();   // idx -> {script, bullets, video_seconds, type, title}
window._videoDurationCache={};       // src -> seconds
window._slideThumbs={};              // idx -> dataUrl
window._notesMeta={};                // {target_finish, default_view, wpm}
window._adaptiveWpm=null;            // rolling WPM, set after a few advances
let _wpmSamples=[];                  // [{words, seconds}]

function _wordsCount(s){return (s||'').trim().split(/\s+/).filter(Boolean).length;}
function _splitOverVideo(script){
  if(!script)return{pre:'',over:''};
  const m=script.match(OVER_VIDEO_RE);
  if(!m)return{pre:script,over:''};
  const i=m.index;
  return{pre:script.slice(0,i).trim(),over:script.slice(i+m[0].length).trim()};
}
function _videoSecondsFor(idx){
  const ov=_notesOverrides.get(idx);
  if(ov&&ov.video_seconds!=null)return Number(ov.video_seconds)||0;
  const sl=allSlides[idx];if(!sl)return 0;
  let total=0;
  sl.querySelectorAll('video').forEach(v=>{
    const cached=v.src&&_videoDurationCache[v.src];
    if(cached)total+=Number(cached)||0;
    else if(isFinite(v.duration)&&v.duration>0)total+=v.duration;
  });
  return total;
}
function _effectiveWpm(){
  if(_notesMeta.wpm)return Number(_notesMeta.wpm);
  if(_adaptiveWpm)return _adaptiveWpm;
  return 150;
}
// Override estimateSlideDuration if it exists
if(typeof estimateSlideDuration==='function'){
  window._origEstimateSlideDuration=estimateSlideDuration;
  window.estimateSlideDuration=function(idx){
    const sl=allSlides[idx];if(!sl)return 30;
    const ov=_notesOverrides.get(idx);
    const script=ov&&ov.script!=null?ov.script:getSlideNotes(idx);
    if(!script||!script.trim())return _origEstimateSlideDuration(idx);
    const{pre,over}=_splitOverVideo(script);
    const vidSec=_videoSecondsFor(idx);
    const wpm=_effectiveWpm();
    const preSec=_wordsCount(pre)/wpm*60;
    // Words AFTER (over video) are spoken concurrently with the video.
    // Slide time = pre-speech + max(video_dur, over-speech).
    const overSec=_wordsCount(over)/wpm*60;
    const concurrent=Math.max(vidSec,overSec);
    let total=preSec+concurrent;
    const ty=sl.dataset.type||'';
    if(ty==='lesson'||ty==='bonus')total+=10;
    const ss=slideSteps.get(sl);
    if(ss&&ss.steps.length>1)total+=(ss.steps.length-1)*5;
    return Math.max(5,Math.round(total));
  };
}
function calcEstimateFromIdx(fromIdx){
  let total=0;
  for(let i=fromIdx;i<allSlides.length;i++){
    if(allSlides[i].dataset.hidden==='1')continue;
    total+=estimateSlideDuration(i);
  }
  return total;
}
function calcConsumedThrough(idx){
  let total=0;
  for(let i=0;i<=idx&&i<allSlides.length;i++){
    if(allSlides[i].dataset.hidden==='1')continue;
    total+=estimateSlideDuration(i);
  }
  return total;
}
// Hook slide advance to feed adaptive WPM
window._notesPrevAdvance={idx:null,t:null};
function _onSlideChange(newIdx){
  const prev=_notesPrevAdvance;
  if(prev.idx!=null&&prev.t!=null&&_talkStartTime){
    const sl=allSlides[prev.idx];
    if(sl&&sl.dataset.hidden!=='1'){
      const ov=_notesOverrides.get(prev.idx);
      const script=ov&&ov.script!=null?ov.script:getSlideNotes(prev.idx);
      const{pre,over}=_splitOverVideo(script||'');
      const wordsSpoken=_wordsCount(pre)+_wordsCount(over);
      const elapsedOnSlide=(Date.now()-prev.t)/1000;
      // Subtract concurrent video time from elapsed for WPM calc, since words run alongside video
      const vidSec=_videoSecondsFor(prev.idx);
      const speakingTime=Math.max(1,elapsedOnSlide-Math.min(vidSec,elapsedOnSlide*.6));
      if(wordsSpoken>15&&speakingTime>10){
        _wpmSamples.push({words:wordsSpoken,seconds:speakingTime});
        if(_wpmSamples.length>=3){
          const recent=_wpmSamples.slice(-8);
          const wTotal=recent.reduce((a,s)=>a+s.words,0);
          const sTotal=recent.reduce((a,s)=>a+s.seconds,0);
          const calc=wTotal/sTotal*60;
          _adaptiveWpm=Math.max(90,Math.min(220,calc));
        }
      }
    }
  }
  _notesPrevAdvance={idx:newIdx,t:Date.now()};
}

window._notesConfig=null;
async function loadNotesConfig(){
  if(window._notesConfig)return window._notesConfig;
  try{
    const r=await fetch('notes-config.json',{cache:'no-store'});
    if(!r.ok)throw new Error('no config file');
    const cfg=await r.json();
    if(!cfg.gasUrl||!cfg.deckId)throw new Error('config missing gasUrl/deckId');
    window._notesConfig=cfg;return cfg;
  }catch(e){window._notesConfig=null;return null;}
}
async function syncCall(action,extra){
  const cfg=await loadNotesConfig();if(!cfg){const e=new Error('offline');e._offline=true;throw e;}
  const payload=Object.assign({action,deckId:cfg.deckId},extra||{});
  const resp=await fetch(cfg.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload),redirect:'follow'});
  const data=await resp.json();
  if(!data.ok)throw new Error(data.error||'sync failed');
  return data.result;
}
function _slideRecordForSeed(idx){
  const sl=allSlides[idx];if(!sl)return null;
  return{idx,type:sl.dataset.type||'',title:getSlideTitle(idx)||'',script:getSlideNotes(idx)||'',bullets:null,video_seconds:null};
}
async function seedFromSections(force){
  const seedData=allSlides.map((_,i)=>_slideRecordForSeed(i)).filter(Boolean);
  if(force){await syncCall('setNotes',{slides:seedData});return{seeded:true,forced:true,count:seedData.length};}
  return await syncCall('seedNotes',{slides:seedData});
}
function _applyNotesData(data){
  if(!data)return;
  _notesOverrides.clear();
  (data.slides||[]).forEach(s=>{_notesOverrides.set(Number(s.idx),s);});
  _notesMeta=data.meta||{};
  if(_notesMeta.calibration){
    const c=_notesMeta.calibration;
    if(c.videoDurations)_videoDurationCache=Object.assign({},c.videoDurations);
    if(c.thumbnails)_slideThumbs=Object.assign({},c.thumbnails);
  }
}

function _fmtClock(d){const h=d.getHours(),m=d.getMinutes();const ap=h>=12?'PM':'AM';const h12=((h+11)%12)+1;return h12+':'+String(m).padStart(2,'0')+' '+ap;}
function _fmtMS(s){const sign=s<0?'-':'';s=Math.abs(s);const m=Math.floor(s/60),sec=Math.floor(s%60);return sign+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

// Sentence-split bullets (cheap)
function autoBullets(script){
  if(!script||!script.trim())return[];
  const cleaned=script.replace(OVER_VIDEO_RE,' ').replace(/\s+/g,' ').trim();
  const sentences=cleaned.match(/[^.!?…]+[.!?…]+|[^.!?…]+$/g)||[cleaned];
  return sentences.map(s=>{
    const t=s.trim();if(!t)return null;
    const w=t.split(/\s+/);
    if(w.length<=14)return t;
    return w.slice(0,14).join(' ')+'…';
  }).filter(Boolean).slice(0,8);
}
function bulletsForSlide(idx){
  const ov=_notesOverrides.get(idx);
  if(ov&&Array.isArray(ov.bullets)&&ov.bullets.length)return ov.bullets;
  const script=ov&&ov.script!=null?ov.script:getSlideNotes(idx);
  return autoBullets(script);
}
function scriptForSlide(idx){
  const ov=_notesOverrides.get(idx);
  return ov&&ov.script!=null?ov.script:(getSlideNotes(idx)||'');
}

function _renderTopbar(){
  if(!document.body.classList.contains('notes-mode'))return;
  const idx=current;const total=allSlides.length;
  const visible=_visibleSlideIdxs();

function _updatePacingDisplay(){
  const elapsedSec=_talkStartTime?Math.floor((Date.now()-_talkStartTime)/1000):0;
  document.getElementById('na-elapsed').textContent=_fmtMS(elapsedSec);
  const targetISO=_notesMeta.target_finish||_notesView.target;
  const tLine=document.getElementById('na-target-line');
  const proj=document.getElementById('na-projected');
  const dot=document.getElementById('na-pace-dot');
  if(!_talkStartTime){
    if(targetISO){const td=new Date(targetISO);if(!isNaN(td)){tLine.textContent='Target: '+_fmtClock(td);tLine.className='na-target';}else{tLine.textContent='no target set';}}
    else tLine.textContent='no target set';
    proj.textContent='';dot.className='na-pace-dot';return;
  }
  const remainEst=calcEstimateFromIdx(current);
  const projectedFinish=new Date(Date.now()+remainEst*1000);
  proj.textContent='Projected: '+_fmtClock(projectedFinish);
  if(targetISO){
    const td=new Date(targetISO);
    if(!isNaN(td)){
      tLine.textContent='Target: '+_fmtClock(td);
      const diffMin=(projectedFinish.getTime()-td.getTime())/60000;
      let cls='';
      if(diffMin>2)cls='warn';
      if(diffMin>5)cls='late';
      if(diffMin<-2)cls='warn'; // also flag if way ahead
      tLine.className='na-target '+(diffMin>5?'late':diffMin>2?'warn':'');
      proj.className='na-projected '+(diffMin>5?'late':diffMin>2?'warn':'');
      dot.className='na-pace-dot'+(diffMin>5?' late':diffMin>2?' warn':'');
    }
  }else{tLine.textContent='no target set';dot.className='na-pace-dot';}
}

    if(img.complete&&img.naturalWidth>0)return Promise.resolve();
    img.loading='eager';
    return new Promise(res=>{
      let done=false;const fin=()=>{if(done)return;done=true;res();};
      img.addEventListener('load',fin,{once:true});
      img.addEventListener('error',fin,{once:true});
      setTimeout(fin,4000);
      // Re-trigger load if needed
      if(!img.src){fin();return;}
      const orig=img.src;img.src='';img.src=orig;
    });
  }));
}
async function _preloadVideoFrames(){
  const vids=Array.from(document.querySelectorAll('#deck video'));
  await Promise.all(vids.map(v=>{
    if(v.readyState>=2)return Promise.resolve();
    return new Promise(res=>{
      let done=false;const fin=()=>{if(done)return;done=true;res();};
      v.addEventListener('loadeddata',fin,{once:true});
      v.addEventListener('error',fin,{once:true});
      setTimeout(fin,5000);
      if(v.preload==='none')v.preload='metadata';
      try{v.load();}catch(_){}
    });
  }));
}
function _drawCoverFit(ctx,src,sw,sh,dw,dh){
  if(!sw||!sh)return false;
  const ratio=Math.max(dw/sw,dh/sh);
  const tw=sw*ratio,th=sh*ratio;
  ctx.drawImage(src,(dw-tw)/2,(dh-th)/2,tw,th);
  return true;
}
function captureSlideThumb(idx,W,H){
  W=W||160;H=H||90;
  const sl=allSlides[idx];if(!sl)return null;
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  // Try first <img> (handle SVGs whose naturalWidth may be 0)
  const img=sl.querySelector('img');
  if(img&&img.complete){
    const sw=img.naturalWidth||img.width||300;
    const sh=img.naturalHeight||img.height||200;
    if(sw>0&&sh>0){
      try{_drawCoverFit(ctx,img,sw,sh,W,H);return canvas.toDataURL('image/jpeg',0.55);}
      catch(e){/* CORS-tainted, fall through */}
    }
  }
  // Try first inner <canvas> (MEDIA_CYCLER mount renders into one)
  const innerCnv=sl.querySelector('.media-cycler-mount canvas, canvas:not(#stars)');
  if(innerCnv&&innerCnv.width>0){
    try{_drawCoverFit(ctx,innerCnv,innerCnv.width,innerCnv.height,W,H);return canvas.toDataURL('image/jpeg',0.55);}
    catch(e){}
  }
  // Try first <video>
  const vid=sl.querySelector('video');
  if(vid&&vid.videoWidth>0){
    try{_drawCoverFit(ctx,vid,vid.videoWidth,vid.videoHeight,W,H);return canvas.toDataURL('image/jpeg',0.55);}
    catch(e){}
  }
  // Fallback: rendered text card
  return _renderTextCardThumb(sl,idx,W,H);
}
function _renderTextCardThumb(sl,idx,W,H){
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const ty=sl.dataset.type||'';
  const accent=sl.classList.contains('accent-purple')?'#a78bfa':sl.classList.contains('accent-amber')?'#f59e0b':sl.classList.contains('accent-rose')?'#f43f5e':'#00d4ff';
  // Background
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0a0d1c');grad.addColorStop(1,'#1a1530');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=accent+'22';ctx.fillRect(0,0,4,H);
  // Slide number
  ctx.fillStyle=accent;ctx.font='700 9px sans-serif';
  ctx.fillText(String(idx).padStart(2,'0'),10,14);
  // Type badge
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='700 7px sans-serif';
  ctx.fillText((ty||'slide').toUpperCase(),W-Math.min(W-12,40),14);
  // Title (word-wrapped)
  const title=getSlideTitle(idx)||'';
  ctx.fillStyle='rgba(240,244,255,.92)';ctx.font='600 11px sans-serif';
  const words=title.split(/\s+/);
  let line='',y=34;
  words.forEach(w=>{
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>W-20&&line){ctx.fillText(line,10,y);line=w;y+=14;if(y>H-6)return;}
    else line=test;
  });
  if(line&&y<=H-4)ctx.fillText(line,10,y);
  return canvas.toDataURL('image/jpeg',0.65);
}
async function runCalibration(){
  naToast('Calibrating…');
  const t0=Date.now();
  // Force-load images and video metadata so captures aren't blank
  await Promise.race([Promise.all([_preloadAllImages(),_preloadVideoFrames()]),new Promise(r=>setTimeout(r,8000))]);
  // Video durations
  const videoDurations={};
  const seen=new Set();
  for(let i=0;i<allSlides.length;i++){
    const vids=allSlides[i].querySelectorAll('video');
    for(const v of vids){
      if(!v.src||seen.has(v.src))continue;seen.add(v.src);
      if(isFinite(v.duration)&&v.duration>0)videoDurations[v.src]=Number(v.duration.toFixed(1));
    }
  }
  _videoDurationCache=videoDurations;
  // Slide thumbnails
  const thumbnails={};
  for(let i=0;i<allSlides.length;i++){
    const sl=allSlides[i];
    if(sl.dataset.hidden==='1')continue;
    if(sl.dataset.type==='settings')continue;
    try{const t=captureSlideThumb(i,160,90);if(t)thumbnails[i]=t;}catch(e){}
  }
  _slideThumbs=thumbnails;
  // Cache to localStorage (per-deckId)
  try{
    const cfg=window._notesConfig;const deckId=(cfg&&cfg.deckId)||'default';
    localStorage.setItem('sd-thumbs-'+deckId,JSON.stringify(thumbnails));
    localStorage.setItem('sd-vidcache-'+deckId,JSON.stringify(videoDurations));
    localStorage.setItem('sd-calibrated-'+deckId,'1');
  }catch(e){}
  const calibration={videoDurations,calibratedAt:new Date().toISOString(),slideCount:Object.keys(thumbnails).length};
  try{await syncCall('setMeta',{key:'calibration',value:calibration});naToast('Calibration saved · '+Object.keys(thumbnails).length+' thumbs · '+Object.keys(videoDurations).length+' videos');}
  catch(e){naToast('Calibration local only · '+Object.keys(thumbnails).length+' thumbs');}
  _renderTopbar();
  console.log('[calibration] '+(Date.now()-t0)+'ms · '+Object.keys(thumbnails).length+' thumbs · '+Object.keys(videoDurations).length+' videos');
}

  }catch(e){}

    // Non-blocking toast — local-only mode is fine for demo / first run

  }else{
    try{
      const data=await syncCall('getNotes',{});
      if(!data.slides||!data.slides.length){

  document.getElementById('na-tp-save').addEventListener('click',naSaveTarget);

  document.getElementById('na-sd-doc').addEventListener('click',()=>{sdEl.classList.remove('open');_notesView.docOpen=!_notesView.docOpen;_notesView.editing=false;naRenderContent();_updateNavBarVisibility();});
  document.getElementById('na-sd-target').addEventListener('click',()=>{sdEl.classList.remove('open');naOpenTargetPicker();});
  sdDefView.addEventListener('change',async()=>{
    _notesMeta.default_view=sdDefView.value;
    sdStatus.textContent='Default view: '+sdDefView.value;
    naRenderContent();
    try{await syncCall('setMeta',{key:'default_view',value:sdDefView.value});sdStatus.textContent='Saved · default = '+sdDefView.value;}
    catch(e){sdStatus.textContent='Local only';}

  document.getElementById('na-sd-calibrate').addEventListener('click',async()=>{

{
