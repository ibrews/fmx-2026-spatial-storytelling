<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Space Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0820"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Top node: Who is your user? -->
  <rect x="330" y="30" width="300" height="56" rx="28" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
  <text x="480" y="65" text-anchor="middle" fill="#f0f4ff" font-size="18" font-weight="600">Who is your user?</text>

  <!-- Lines down from top -->
  <line x1="380" y1="86" x2="220" y2="150" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="580" y1="86" x2="740" y2="150" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Left branch: Fixed location -->
  <rect x="100" y="150" width="240" height="50" rx="12" fill="rgba(0,212,255,0.12)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="220" y="172" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="500">Fixed location</text>
  <text x="220" y="189" text-anchor="middle" fill="rgba(240,244,255,0.5)" font-size="11">showroom · sales center · LBE</text>

  <!-- Right branch: Variable audience -->
  <rect x="620" y="150" width="240" height="50" rx="12" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="740" y="172" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="500">Variable / public audience</text>
  <text x="740" y="189" text-anchor="middle" fill="rgba(240,244,255,0.5)" font-size="11">app store · events · education</text>

  <!-- Left: Need photorealism? -->
  <line x1="220" y1="200" x2="220" y2="250" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <rect x="100" y="250" width="240" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="220" y="278" text-anchor="middle" fill="#f0f4ff" font-size="14">Need photorealism?</text>

  <!-- Left sub-branches -->
  <line x1="160" y1="294" x2="120" y2="340" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="280" y1="294" x2="320" y2="340" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Yes → PCVR -->
  <text x="130" y="330" text-anchor="middle" fill="rgba(240,244,255,0.35)" font-size="11">YES</text>
  <rect x="30" y="340" width="180" height="70" rx="12" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="120" y="368" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="600">PCVR</text>
  <text x="120" y="388" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Wireless backpack or</text>
  <text x="120" y="402" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">tethered workstation</text>

  <!-- No → Standalone -->
  <text x="310" y="330" text-anchor="middle" fill="rgba(240,244,255,0.35)" font-size="11">NO</text>
  <rect x="230" y="340" width="180" height="70" rx="12" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="320" y="368" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="600">Standalone</text>
  <text x="320" y="388" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Quest · Pico · Vive XR</text>
  <text x="320" y="402" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Elite</text>

  <!-- Left conclusion -->
  <line x1="120" y1="410" x2="220" y2="470" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4"/>
  <line x1="320" y1="410" x2="220" y2="470" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4"/>
  <rect x="110" y="470" width="220" height="44" rx="22" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="220" y="498" text-anchor="middle" fill="#f0f4ff" font-size="13" font-weight="600">Optimize for one platform</text>

  <!-- Right: Browser access needed? -->
  <line x1="740" y1="200" x2="740" y2="250" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <rect x="620" y="250" width="240" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="740" y="278" text-anchor="middle" fill="#f0f4ff" font-size="14">Browser access needed?</text>

  <!-- Right sub-branches -->
  <line x1="680" y1="294" x2="640" y2="340" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="800" y1="294" x2="840" y2="340" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Yes → WebXR -->
  <text x="650" y="330" text-anchor="middle" fill="rgba(240,244,255,0.35)" font-size="11">YES</text>
  <rect x="550" y="340" width="180" height="70" rx="12" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="640" y="368" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="600">WebXR</text>
  <text x="640" y="388" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Three.js · Babylon · 8th Wall</text>
  <text x="640" y="402" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Lower fidelity, zero install</text>

  <!-- No → OpenXR native -->
  <text x="830" y="330" text-anchor="middle" fill="rgba(240,244,255,0.35)" font-size="11">NO</text>
  <rect x="750" y="340" width="180" height="70" rx="12" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="840" y="368" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="600">OpenXR Native</text>
  <text x="840" y="388" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Unreal · Unity</text>
  <text x="840" y="402" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="11">Cross-platform + fallbacks</text>

  <!-- Right conclusion -->
  <line x1="640" y1="410" x2="740" y2="470" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4"/>
  <line x1="840" y1="410" x2="740" y2="470" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4"/>
  <rect x="630" y="470" width="220" height="44" rx="22" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="740" y="498" text-anchor="middle" fill="#f0f4ff" font-size="13" font-weight="600">OpenXR + graceful fallbacks</text>

  <!-- Bottom label -->
  <text x="480" y="565" text-anchor="middle" fill="rgba(240,244,255,0.2)" font-size="12" font-weight="500" letter-spacing="0.15em">PLATFORM DECISION FRAMEWORK</text>
</svg>