<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Space Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0820"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
  </defs>

  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="52" text-anchor="middle" fill="rgba(240,244,255,0.25)" font-size="12" font-weight="600" letter-spacing="0.15em">STUDIO EVALUATION SCORECARD</text>

  <!-- Row backgrounds -->
  <rect x="80" y="80" width="800" height="82" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="80" y="178" width="800" height="82" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="80" y="276" width="800" height="82" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="80" y="374" width="800" height="82" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="80" y="472" width="800" height="82" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Row 1: Green -->
  <circle cx="130" cy="121" r="14" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <polyline points="121,121 127,128 140,114" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="165" y="115" fill="#f0f4ff" font-size="17" font-weight="600">Working prototype in two weeks?</text>
  <text x="165" y="140" fill="rgba(240,244,255,0.4)" font-size="13">Not a pitch deck in two months. Ask to see something running.</text>

  <!-- Row 2: Green -->
  <circle cx="130" cy="219" r="14" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <polyline points="121,219 127,226 140,212" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="165" y="213" fill="#f0f4ff" font-size="17" font-weight="600">Real-time engine? (Unreal / Unity)</text>
  <text x="165" y="238" fill="rgba(240,244,255,0.4)" font-size="13">Pre-rendered means no iteration. Real-time means you can change your mind.</text>

  <!-- Row 3: Amber -->
  <circle cx="130" cy="317" r="14" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="130" y="323" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="700">?</text>
  <text x="165" y="311" fill="#f0f4ff" font-size="17" font-weight="600">Handles mid-project design changes?</text>
  <text x="165" y="336" fill="rgba(240,244,255,0.4)" font-size="13">"What happens when we change the floor plan halfway through?"</text>

  <!-- Row 4: Green -->
  <circle cx="130" cy="415" r="14" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <polyline points="121,415 127,422 140,408" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="165" y="409" fill="#f0f4ff" font-size="17" font-weight="600">Multiplayer architected from day one?</text>
  <text x="165" y="434" fill="rgba(240,244,255,0.4)" font-size="13">Networking can't be bolted on later. It's structural.</text>

  <!-- Row 5: Red -->
  <circle cx="130" cy="513" r="14" fill="none" stroke="#f43f5e" stroke-width="2.5"/>
  <line x1="120" y1="503" x2="140" y2="523" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="503" x2="120" y2="523" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>
  <text x="165" y="507" fill="#f0f4ff" font-size="17" font-weight="600">Shipped past a single demo day?</text>
  <text x="165" y="532" fill="rgba(240,244,255,0.4)" font-size="13">Trade shows ≠ production. Has it run 8 hours a day for months?</text>
</svg>