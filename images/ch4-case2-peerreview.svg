<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Space Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0820"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(240,244,255,0.5)"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="url(#bg2)"/>

  <!-- CENTER: a stylized slide under review -->
  <g transform="translate(330 130)">
    <rect x="0" y="0" width="300" height="190" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- slide counter badge -->
    <rect x="16" y="16" width="52" height="20" rx="4" fill="none" stroke="rgba(0,212,255,0.5)"/>
    <text x="42" y="30" text-anchor="middle" fill="#00d4ff" font-size="10" font-family="ui-monospace, monospace" letter-spacing="2">CH 2</text>
    <!-- slide title -->
    <text x="16" y="64" fill="#f0f4ff" font-size="16" font-weight="700">The OpenXR Question</text>
    <text x="16" y="82" fill="rgba(240,244,255,0.5)" font-size="11">Build once, or build for the room you&#8217;re in?</text>
    <!-- bullets -->
    <g font-size="10" fill="rgba(240,244,255,0.65)">
      <circle cx="22" cy="106" r="3" fill="#a78bfa"/>
      <text x="32" y="110">OpenXR promises write-once, deploy-anywhere.</text>
      <circle cx="22" cy="126" r="3" fill="#a78bfa"/>
      <text x="32" y="130">Input mapping + performance still diverge.</text>
      <circle cx="22" cy="146" r="3" fill="#a78bfa"/>
      <text x="32" y="150">Fixed audience → optimize ruthlessly.</text>
      <circle cx="22" cy="166" r="3" fill="#a78bfa"/>
      <text x="32" y="170">Unknown audience → graceful fallbacks win.</text>
    </g>
  </g>

  <!-- LEFT REVIEWER: Sam / llama3.1:8b, narrative lens -->
  <g transform="translate(40 130)">
    <rect x="0" y="0" width="250" height="190" rx="14" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="14" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="30" y="35" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="700">S</text>
    <text x="56" y="28" fill="#00d4ff" font-size="12" font-weight="700">Sam</text>
    <text x="56" y="42" fill="rgba(240,244,255,0.55)" font-size="10" font-family="ui-monospace, monospace">llama3.1:8b</text>
    <text x="16" y="72" fill="rgba(240,244,255,0.85)" font-size="10" font-weight="600" letter-spacing="1">LENS &#183; NARRATIVE CLARITY</text>
    <g font-size="10">
      <rect x="16" y="85" width="218" height="26" rx="5" fill="rgba(244,63,94,0.12)" stroke="rgba(244,63,94,0.4)"/>
      <circle cx="26" cy="98" r="3" fill="#f43f5e"/>
      <text x="36" y="102" fill="rgba(240,244,255,0.85)">bullets 1 + 2 say the same thing</text>

      <rect x="16" y="119" width="218" height="26" rx="5" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.4)"/>
      <circle cx="26" cy="132" r="3" fill="#f59e0b"/>
      <text x="36" y="136" fill="rgba(240,244,255,0.85)">subtitle is a question, not a hook</text>

      <rect x="16" y="153" width="218" height="26" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(240,244,255,0.2)"/>
      <circle cx="26" cy="166" r="3" fill="rgba(240,244,255,0.5)"/>
      <text x="36" y="170" fill="rgba(240,244,255,0.65)">consider adding a numeric stat</text>
    </g>
  </g>

  <!-- RIGHT REVIEWER: Archie / qwen2.5-coder:14b, structural lens -->
  <g transform="translate(670 130)">
    <rect x="0" y="0" width="250" height="190" rx="14" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="14" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="30" y="35" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">A</text>
    <text x="56" y="28" fill="#a78bfa" font-size="12" font-weight="700">Archie</text>
    <text x="56" y="42" fill="rgba(240,244,255,0.55)" font-size="10" font-family="ui-monospace, monospace">qwen2.5-coder:14b</text>
    <text x="16" y="72" fill="rgba(240,244,255,0.85)" font-size="10" font-weight="600" letter-spacing="1">LENS &#183; STRUCTURAL CONSISTENCY</text>
    <g font-size="10">
      <rect x="16" y="85" width="218" height="26" rx="5" fill="rgba(244,63,94,0.12)" stroke="rgba(244,63,94,0.4)"/>
      <circle cx="26" cy="98" r="3" fill="#f43f5e"/>
      <text x="36" y="102" fill="rgba(240,244,255,0.85)">bullets 1 + 2 duplicate framing</text>

      <rect x="16" y="119" width="218" height="26" rx="5" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.4)"/>
      <circle cx="26" cy="132" r="3" fill="#f59e0b"/>
      <text x="36" y="136" fill="rgba(240,244,255,0.85)">parallel bullets, no parallel verbs</text>

      <rect x="16" y="153" width="218" height="26" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(240,244,255,0.2)"/>
      <circle cx="26" cy="166" r="3" fill="rgba(240,244,255,0.5)"/>
      <text x="36" y="170" fill="rgba(240,244,255,0.65)">last bullet length &gt; 140 chars</text>
    </g>
  </g>

  <!-- arrows between slide and reviewers -->
  <g stroke="rgba(240,244,255,0.35)" stroke-width="1.5" fill="none">
    <path d="M 290 225 L 325 225" marker-end="url(#arr2)"/>
    <path d="M 635 225 L 670 225" marker-end="url(#arr2)"/>
  </g>

  <!-- MERGE-VOTE BAR at bottom -->
  <g transform="translate(170 390)">
    <text x="310" y="0" text-anchor="middle" fill="rgba(240,244,255,0.85)" font-size="13" font-weight="700" letter-spacing="2">MERGE-VOTE</text>

    <!-- 🔴 both-flagged -->
    <rect x="0" y="20" width="620" height="34" rx="8" fill="rgba(244,63,94,0.15)" stroke="#f43f5e" stroke-width="1.5"/>
    <circle cx="20" cy="37" r="6" fill="#f43f5e"/>
    <text x="40" y="42" fill="#f43f5e" font-size="11" font-weight="700" letter-spacing="1">BOTH FLAGGED</text>
    <text x="170" y="42" fill="rgba(240,244,255,0.85)" font-size="11">bullets 1 &amp; 2 are redundant &#8212; collapse or differentiate</text>

    <!-- 🟡 one-flagged (Sam only) -->
    <rect x="0" y="64" width="300" height="30" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <circle cx="20" cy="79" r="5" fill="#f59e0b"/>
    <text x="38" y="83" fill="#f59e0b" font-size="10" font-weight="600">SAM</text>
    <text x="78" y="83" fill="rgba(240,244,255,0.7)" font-size="10">subtitle is a question</text>

    <!-- 🟡 one-flagged (Archie only) -->
    <rect x="320" y="64" width="300" height="30" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <circle cx="340" cy="79" r="5" fill="#f59e0b"/>
    <text x="358" y="83" fill="#f59e0b" font-size="10" font-weight="600">ARCHIE</text>
    <text x="410" y="83" fill="rgba(240,244,255,0.7)" font-size="10">bullet 4 over 140 chars</text>
  </g>

  <!-- caption -->
  <text x="480" y="530" text-anchor="middle" fill="rgba(240,244,255,0.55)" font-size="13">Two model families, different error profiles. Agreement is signal.</text>
</svg>
