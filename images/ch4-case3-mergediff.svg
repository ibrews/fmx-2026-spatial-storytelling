<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Space Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0820"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <filter id="softGlow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(240,244,255,0.5)"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="url(#bg3)"/>

  <!-- Three input decks on the left (git-branch style) -->
  <g font-size="11">
    <!-- Branch A: teal -->
    <rect x="40"  y="80"  width="170" height="60" rx="10" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="58"  y="103" fill="#00d4ff" font-weight="700">Deck&#160;A</text>
    <text x="58"  y="120" fill="rgba(240,244,255,0.6)" font-size="10">12 chapters &#183; talk.html</text>
    <text x="58"  y="134" fill="rgba(240,244,255,0.45)" font-size="9" font-family="ui-monospace, monospace">CH 1 &#183; CH 2 &#183; CH 3 &#183; &#8230;</text>

    <!-- Branch B: purple -->
    <rect x="40"  y="165" width="170" height="60" rx="10" fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="58"  y="188" fill="#a78bfa" font-weight="700">Deck&#160;B</text>
    <text x="58"  y="205" fill="rgba(240,244,255,0.6)" font-size="10">8 chapters &#183; workshop.md</text>
    <text x="58"  y="219" fill="rgba(240,244,255,0.45)" font-size="9" font-family="ui-monospace, monospace">CH 2 &#183; CH 4 &#183; CH 7</text>

    <!-- Branch C: amber -->
    <rect x="40"  y="250" width="170" height="60" rx="10" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="58"  y="273" fill="#f59e0b" font-weight="700">Deck&#160;C</text>
    <text x="58"  y="290" fill="rgba(240,244,255,0.6)" font-size="10">5 chapters &#183; fork.html</text>
    <text x="58"  y="304" fill="rgba(240,244,255,0.45)" font-size="9" font-family="ui-monospace, monospace">CH 1 &#183; CH 9</text>
  </g>

  <!-- Branch lines merging into the merge node -->
  <g stroke-width="2" fill="none" marker-end="url(#arr3)">
    <path d="M 210 110 C 320 110, 340 250, 420 280" stroke="rgba(0,212,255,0.55)"/>
    <path d="M 210 195 L 420 290" stroke="rgba(167,139,250,0.55)"/>
    <path d="M 210 280 C 320 280, 340 320, 420 300" stroke="rgba(245,158,11,0.55)"/>
  </g>

  <!-- CENTER: merge node (hexagon) -->
  <g filter="url(#softGlow3)">
    <polygon points="480,230 555,270 555,320 480,360 405,320 405,270" fill="rgba(244,63,94,0.16)" stroke="#f43f5e" stroke-width="2.5"/>
  </g>
  <text x="480" y="290" text-anchor="middle" fill="#f43f5e" font-size="12" font-weight="700" letter-spacing="2">merge_decks</text>
  <text x="480" y="310" text-anchor="middle" fill="rgba(240,244,255,0.6)" font-size="10" font-family="ui-monospace, monospace">detect conflicts</text>

  <!-- Conflict flags floating near merge -->
  <g font-size="10">
    <rect x="230" y="380" width="220" height="26" rx="5" fill="rgba(244,63,94,0.12)" stroke="rgba(244,63,94,0.5)"/>
    <circle cx="244" cy="393" r="4" fill="#f43f5e"/>
    <text x="256" y="397" fill="rgba(240,244,255,0.85)">year collision: &#8216;CH 2&#8217; A &#8596; B</text>

    <rect x="230" y="412" width="220" height="26" rx="5" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.5)"/>
    <circle cx="244" cy="425" r="4" fill="#f59e0b"/>
    <text x="256" y="429" fill="rgba(240,244,255,0.85)">duplicate title: &#8216;Red Flags&#8217;</text>

    <rect x="230" y="444" width="220" height="26" rx="5" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.5)"/>
    <circle cx="244" cy="457" r="4" fill="#f59e0b"/>
    <text x="256" y="461" fill="rgba(240,244,255,0.85)">jaccard &#8776; 62%: near-dupe</text>
  </g>

  <!-- arrow out to diff card -->
  <path d="M 555 295 L 700 295" stroke="rgba(240,244,255,0.35)" stroke-width="1.5" fill="none" marker-end="url(#arr3)"/>

  <!-- RIGHT: diff/ship card -->
  <g>
    <rect x="705" y="150" width="220" height="300" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(240,244,255,0.2)" stroke-width="1.5"/>
    <text x="815" y="178" text-anchor="middle" fill="rgba(240,244,255,0.85)" font-size="11" font-weight="700" letter-spacing="2">SECTIONS.json</text>
    <text x="815" y="195" text-anchor="middle" fill="rgba(240,244,255,0.45)" font-size="10" font-family="ui-monospace, monospace">diff-ready</text>

    <!-- diff lines -->
    <g font-family="ui-monospace, monospace" font-size="10">
      <rect x="720" y="210" width="190" height="20" fill="rgba(34,197,94,0.15)"/>
      <text x="730" y="224" fill="#22c55e">+ CH 1 &#183; Define the Spatial&#8230;</text>

      <rect x="720" y="232" width="190" height="20" fill="rgba(34,197,94,0.15)"/>
      <text x="730" y="246" fill="#22c55e">+ CH 2 &#183; Match the Platform&#8230;</text>

      <rect x="720" y="254" width="190" height="20" fill="rgba(244,63,94,0.15)"/>
      <text x="730" y="268" fill="#f43f5e">~ CH 2&#8242;&#183; renamed from B.CH 2</text>

      <rect x="720" y="276" width="190" height="20" fill="rgba(34,197,94,0.15)"/>
      <text x="730" y="290" fill="#22c55e">+ CH 3 &#183; Iteration Speed&#8230;</text>

      <rect x="720" y="298" width="190" height="20" fill="rgba(245,158,11,0.15)"/>
      <text x="730" y="312" fill="#f59e0b">! dup title: Red Flags</text>

      <rect x="720" y="320" width="190" height="20" fill="rgba(34,197,94,0.15)"/>
      <text x="730" y="334" fill="#22c55e">+ CH 4 &#183; Deck As Code</text>

      <rect x="720" y="342" width="190" height="20" fill="rgba(240,244,255,0.04)"/>
      <text x="730" y="356" fill="rgba(240,244,255,0.5)">&#8230; 13 more</text>
    </g>

    <!-- ship line -->
    <rect x="720" y="395" width="190" height="36" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="815" y="418" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="700" letter-spacing="3">SHIP &#8594;</text>
  </g>

  <!-- caption -->
  <text x="480" y="530" text-anchor="middle" fill="rgba(240,244,255,0.85)" font-size="15" font-weight="600">Merge &#183; Diff &#183; Ship.</text>
  <text x="480" y="552" text-anchor="middle" fill="rgba(240,244,255,0.55)" font-size="12">Mechanical merge. Conflicts surfaced. Idempotent splice between sentinels.</text>
</svg>
