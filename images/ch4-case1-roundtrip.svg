<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Space Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0820"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="roseGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(240,244,255,0.55)"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="960" y2="150"/>
    <line x1="0" y1="300" x2="960" y2="300"/>
    <line x1="0" y1="450" x2="960" y2="450"/>
  </g>

  <!-- LEFT: stacked input formats -->
  <g font-size="13" font-weight="500">
    <rect x="60"  y="90"  width="200" height="54" rx="10" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="90"  y="123" fill="#00d4ff" font-family="ui-monospace, monospace" font-size="14">.md</text>
    <text x="135" y="123" fill="rgba(240,244,255,0.7)">markdown</text>

    <rect x="60" y="168" width="200" height="54" rx="10" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="90"  y="201" fill="#00d4ff" font-family="ui-monospace, monospace" font-size="14">.html</text>
    <text x="145" y="201" fill="rgba(240,244,255,0.7)">web deck</text>

    <rect x="60" y="246" width="200" height="54" rx="10" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="90"  y="279" fill="#00d4ff" font-family="ui-monospace, monospace" font-size="14">.pptx</text>
    <text x="150" y="279" fill="rgba(240,244,255,0.7)">PowerPoint</text>

    <rect x="60" y="324" width="200" height="54" rx="10" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="90"  y="357" fill="#00d4ff" font-family="ui-monospace, monospace" font-size="14">.pdf</text>
    <text x="140" y="357" fill="rgba(240,244,255,0.7)">print-shaped</text>

    <rect x="60" y="402" width="200" height="54" rx="10" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="90"  y="435" fill="#00d4ff" font-family="ui-monospace, monospace" font-size="14">.css</text>
    <text x="140" y="435" fill="rgba(240,244,255,0.7)">design tokens</text>
  </g>

  <!-- flow lines into normalizer -->
  <g stroke="rgba(240,244,255,0.35)" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <path d="M262 117 C 340 117, 360 270, 430 300"/>
    <path d="M262 195 C 340 195, 360 280, 430 300"/>
    <path d="M262 273 L 430 300"/>
    <path d="M262 351 C 340 351, 360 320, 430 300"/>
    <path d="M262 429 C 340 429, 360 330, 430 300"/>
  </g>

  <!-- CENTER: normalizer hexagon -->
  <g filter="url(#softGlow)">
    <polygon points="480,225 555,265 555,335 480,375 405,335 405,265" fill="rgba(244,63,94,0.16)" stroke="url(#roseGlow)" stroke-width="2.5"/>
  </g>
  <text x="480" y="290" text-anchor="middle" fill="#f43f5e" font-size="13" font-weight="700" letter-spacing="2">FLEET</text>
  <text x="480" y="313" text-anchor="middle" fill="rgba(240,244,255,0.75)" font-size="11">llama3.1:8b</text>
  <text x="480" y="330" text-anchor="middle" fill="rgba(240,244,255,0.55)" font-size="10" font-family="ui-monospace, monospace">normalize</text>

  <!-- flow out of normalizer -->
  <path d="M555 300 L 695 300" stroke="rgba(240,244,255,0.35)" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- RIGHT: unified SECTIONS.json card -->
  <rect x="700" y="205" width="210" height="190" rx="16" fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="805" y="230" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700" letter-spacing="2">SECTIONS.json</text>
  <g font-family="ui-monospace, monospace" font-size="11" fill="rgba(240,244,255,0.7)">
    <text x="720" y="255">[ {</text>
    <text x="735" y="273">year: 'CH 1',</text>
    <text x="735" y="291">accent: 'teal',</text>
    <text x="735" y="309">lesson: {…},</text>
    <text x="735" y="327">cases: [ … ]</text>
    <text x="720" y="345">}, … ]</text>
  </g>
  <text x="805" y="378" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="ui-monospace, monospace" opacity="0.7">schema-validated</text>

  <!-- bottom caption -->
  <g text-anchor="middle">
    <text x="480" y="505" fill="rgba(240,244,255,0.85)" font-size="16" font-weight="600">Any format in.</text>
    <text x="480" y="530" fill="rgba(240,244,255,0.55)" font-size="14">Exporters mirror every importer. Round-trip verified: 0 diffs.</text>
  </g>

  <!-- roundtrip return arrow across the bottom -->
  <path d="M 805 405 C 805 470, 540 560, 160 470 L 160 460" stroke="rgba(244,63,94,0.35)" stroke-width="1.5" fill="none" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="480" y="558" text-anchor="middle" fill="rgba(244,63,94,0.6)" font-size="10" font-family="ui-monospace, monospace" letter-spacing="2">EXPORT · SAME SHAPE OUT</text>
</svg>
